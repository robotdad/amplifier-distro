<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amplifier - Settings</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<!-- Theme init (must be first) -->
<script src="/static/theme-init.js"></script>

<!-- Shared theme -->
<link rel="stylesheet" href="/static/amplifier-theme.css">

<style>
/* ------------------------------------------------------------------ */
/*  Settings-Specific Styles                                          */
/* ------------------------------------------------------------------ */

/* Override body for settings layout */
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  min-height: 100vh;
}

/* ------------------------------------------------------------------ */
/*  Card Container                                                     */
/* ------------------------------------------------------------------ */
.settings-card {
  background: var(--canvas-warm);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-card);
  padding: 40px;
  width: 100%;
  max-width: 720px;
}

/* ------------------------------------------------------------------ */
/*  Header                                                             */
/* ------------------------------------------------------------------ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}

.header h1 {
  font-size: 24px;
  font-weight: 700;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.header a {
  font-size: 14px;
  font-weight: 600;
  color: var(--signal);
  text-decoration: none;
  padding: 8px 16px;
  border: 1px solid var(--signal);
  border-radius: var(--radius-button);
  transition: all var(--duration-fast) var(--ease-out);
}

.header a:hover {
  background: var(--signal);
  color: #fff;
}

/* ------------------------------------------------------------------ */
/*  Sections                                                           */
/* ------------------------------------------------------------------ */
.section {
  margin-bottom: 32px;
}

.section:last-child {
  margin-bottom: 0;
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-slate);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

.section-divider {
  border: none;
  border-top: 1px solid var(--canvas-mist);
  margin: 0 0 32px 0;
}

/* ------------------------------------------------------------------ */
/*  Config Fields                                                      */
/* ------------------------------------------------------------------ */
.config-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.config-field {
  background: var(--canvas);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-input);
  padding: 14px 16px;
}

.config-field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-slate);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 6px;
}

.config-field .field-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.config-field input[type="text"] {
  flex: 1;
  background: var(--canvas-warm);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-subtle);
  padding: 8px 12px;
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: border-color var(--duration-fast) var(--ease-out);
}

.config-field input[type="text"]:focus {
  border-color: var(--signal);
}

.config-field .value-display {
  font-size: 14px;
  color: var(--ink);
  font-family: monospace;
}

.btn-save {
  padding: 8px 16px;
  background: var(--signal);
  color: #fff;
  border: none;
  border-radius: var(--radius-button);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-out);
  white-space: nowrap;
}

.btn-save:hover { background: var(--signal-light); }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

/* ------------------------------------------------------------------ */
/*  Provider Status                                                    */
/* ------------------------------------------------------------------ */
.provider-status {
  background: var(--canvas);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-card);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.provider-info {
  display: flex;
  align-items: center;
  gap: 14px;
}

.provider-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-input);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
}

.provider-icon.anthropic { background: var(--signal-soft); color: var(--signal); }
.provider-icon.openai    { background: var(--success-soft); color: var(--success); }
.provider-icon.unknown   { background: var(--canvas-stone); color: var(--ink-fog); }

.provider-details .provider-name {
  font-size: 15px;
  font-weight: 600;
}

.provider-details .provider-model {
  font-size: 13px;
  color: var(--ink-slate);
}

.provider-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-badge {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: var(--radius-button);
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-badge .status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.status-badge.connected {
  background: var(--success-soft);
  color: var(--success);
}
.status-badge.connected .status-dot { background: var(--success); }

.status-badge.disconnected {
  background: var(--error-soft);
  color: var(--error);
}
.status-badge.disconnected .status-dot { background: var(--error); }

.status-badge.loading {
  background: var(--signal-soft);
  color: var(--signal);
}

.btn-test {
  padding: 4px 12px;
  background: transparent;
  color: var(--ink-slate);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-subtle);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}

.btn-test:hover {
  border-color: var(--signal);
  color: var(--signal);
}

.btn-test:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ------------------------------------------------------------------ */
/*  Provider Cards                                                     */
/* ------------------------------------------------------------------ */
.provider-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.provider-card {
  background: var(--canvas);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-card);
  padding: 16px;
  cursor: pointer;
  transition: border-color var(--duration-fast) var(--ease-out);
}
.provider-card:hover { border-color: var(--signal); }
.provider-card.configured { border-color: var(--success); }
.provider-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.provider-card-header h4 { margin: 0; font-size: 14px; font-weight: 600; }
.provider-card p { margin: 0; font-size: 12px; color: var(--ink-slate); }
.provider-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--radius-subtle);
}
.provider-badge.configured { background: var(--success-soft); color: var(--success); }
.provider-badge.detected   { background: var(--signal-soft);  color: var(--signal); }
.provider-env-row {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--canvas-mist);
}
.env-hint { font-size: 12px; color: var(--ink-slate); }
.provider-key-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--canvas-mist);
}
.provider-key-row input {
  flex: 1;
  padding: 6px 10px;
  background: var(--canvas);
  border: 1px solid var(--canvas-mist);
  border-radius: var(--radius-subtle);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 13px;
}
.provider-key-row input:focus { outline: none; border-color: var(--signal); }
.provider-save-msg { font-size: 12px; margin-top: 8px; }
.provider-save-msg.ok   { color: var(--success); }
.provider-save-msg.fail { color: var(--error); }
.provider-card-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--canvas-mist);
}

/* ------------------------------------------------------------------ */
/*  Feature Rows                                                       */
/* ------------------------------------------------------------------ */
.feature-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.feature-row {
  background: var(--canvas);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: background var(--duration-fast) var(--ease-out);
}

.feature-row:first-child { border-radius: var(--radius-input) var(--radius-input) 0 0; }
.feature-row:last-child  { border-radius: 0 0 var(--radius-input) var(--radius-input); }
.feature-row:only-child  { border-radius: var(--radius-input); }

/* CRITICAL BUG FIX: was hardcoded #3f4a5c (dark-mode-only) */
.feature-row:hover { background: var(--canvas-warm); }

/* ------------------------------------------------------------------ */
/*  Toggle Switch                                                      */
/* ------------------------------------------------------------------ */
.toggle {
  width: 44px;
  height: 24px;
  background: var(--canvas-mist);
  border: 2px solid var(--canvas-mist);
  border-radius: var(--radius-button);
  cursor: pointer;
  position: relative;
  transition: all var(--duration-fast) var(--ease-out);
  flex-shrink: 0;
}

.toggle.on {
  background: var(--signal);
  border-color: var(--signal);
}

.toggle .toggle-knob {
  width: 16px;
  height: 16px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: transform var(--duration-fast) var(--ease-spring);
}

.toggle.on .toggle-knob {
  transform: translateX(20px);
}

.toggle.saving {
  opacity: 0.5;
  pointer-events: none;
}

/* ------------------------------------------------------------------ */
/*  Feature Info                                                       */
/* ------------------------------------------------------------------ */
.feature-info {
  flex: 1;
  min-width: 0;
}

.feature-name {
  font-size: 14px;
  font-weight: 600;
}

.feature-desc {
  font-size: 12px;
  color: var(--ink-slate);
  line-height: 1.4;
}

/* ------------------------------------------------------------------ */
/*  Tier Action Button                                                 */
/* ------------------------------------------------------------------ */
.tier-action {
  margin-top: 12px;
}

.btn-tier {
  width: 100%;
  padding: 12px 24px;
  background: transparent;
  color: var(--signal);
  border: 1px solid var(--signal);
  border-radius: var(--radius-button);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-tier:hover {
  background: var(--signal);
  color: #fff;
}

.btn-tier:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-tier .spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ------------------------------------------------------------------ */
/*  Environment Detection                                              */
/* ------------------------------------------------------------------ */
.env-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.env-item {
  background: var(--canvas);
  border-radius: var(--radius-input);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.env-name {
  font-size: 14px;
  font-weight: 500;
}

.env-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: var(--radius-input);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.env-badge.found {
  background: var(--success-soft);
  color: var(--success);
}

.env-badge.missing {
  background: var(--canvas-mist);
  color: var(--ink-slate);
}

/* ------------------------------------------------------------------ */
/*  Integration Rows                                                   */
/* ------------------------------------------------------------------ */
.integration-row {
  background: var(--canvas);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: background var(--duration-fast) var(--ease-out);
  text-decoration: none;
  color: inherit;
}

.integration-row:first-child { border-radius: var(--radius-input) var(--radius-input) 0 0; }
.integration-row:last-child  { border-radius: 0 0 var(--radius-input) var(--radius-input); }
.integration-row:only-child  { border-radius: var(--radius-input); }

/* CRITICAL BUG FIX: was hardcoded #3f4a5c (dark-mode-only) */
.integration-row:hover { background: var(--canvas-warm); }

.integration-status {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: var(--radius-input);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.integration-status.configured {
  background: var(--success-soft);
  color: var(--success);
}

.integration-status.not-configured {
  background: var(--canvas-mist);
  color: var(--ink-slate);
}

.integration-link {
  color: var(--signal);
  font-size: 13px;
  white-space: nowrap;
}

/* ------------------------------------------------------------------ */
/*  Bundle Contents                                                    */
/* ------------------------------------------------------------------ */
.bundle-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.bundle-item {
  background: var(--canvas);
  border-radius: var(--radius-subtle);
  padding: 8px 14px;
  font-size: 13px;
  font-family: monospace;
  color: var(--ink-slate);
  word-break: break-all;
}

/* ------------------------------------------------------------------ */
/*  Stats Grid                                                         */
/* ------------------------------------------------------------------ */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.stat-card {
  background: var(--canvas);
  border-radius: var(--radius-card);
  padding: 16px;
  text-align: center;
}

.stat-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
}

.stat-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-slate);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-top: 2px;
}

/* ------------------------------------------------------------------ */
/*  Preflight Checks                                                   */
/* ------------------------------------------------------------------ */
.preflight-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--canvas);
  border-radius: var(--radius-card);
  padding: 14px 16px;
  margin-bottom: 2px;
}

.preflight-summary-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.preflight-status-icon {
  font-size: 13px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: var(--radius-input);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  background: var(--canvas-stone);
}

.preflight-count {
  font-size: 14px;
  color: var(--ink-slate);
}

.preflight-count strong {
  color: var(--ink);
}

.preflight-phase {
  font-size: 12px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: var(--radius-input);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  background: var(--signal-soft);
  color: var(--signal);
}

.check-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.check-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--canvas);
  font-size: 13px;
  border-top: 1px solid var(--canvas-mist);
}

.check-row:last-child {
  border-radius: 0 0 var(--radius-input) var(--radius-input);
}

.check-icon {
  width: 20px;
  text-align: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}

.check-name {
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  min-width: 130px;
}

.check-message {
  color: var(--ink-slate);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.check-row.check-warn {
  background: var(--warning-soft);
}

.check-row.check-fail {
  background: var(--error-soft);
}

/* ------------------------------------------------------------------ */
/*  Toast Notification                                                 */
/* ------------------------------------------------------------------ */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: var(--radius-card);
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transform: translateY(10px);
  transition: all var(--duration-fast) var(--ease-out);
  pointer-events: none;
  z-index: 100;
}

.toast.visible {
  opacity: 1;
  transform: translateY(0);
}

.toast.success { background: var(--success-soft); color: var(--success); border: 1px solid var(--success); }
.toast.error   { background: var(--error-soft);   color: var(--error);   border: 1px solid var(--error); }

/* ------------------------------------------------------------------ */
/*  Loading State                                                      */
/* ------------------------------------------------------------------ */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 0;
  gap: 16px;
  color: var(--ink-slate);
  font-size: 14px;
}

.loading-spinner {
  width: 24px;
  height: 24px;
  border: 3px solid var(--canvas-mist);
  border-top-color: var(--signal);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

/* ------------------------------------------------------------------ */
/*  Scrollbar                                                          */
/* ------------------------------------------------------------------ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--canvas-mist); border-radius: 3px; }

/* ------------------------------------------------------------------ */
/*  Footer                                                             */
/* ------------------------------------------------------------------ */
.footer-links {
  margin-top: 24px;
  display: flex;
  justify-content: center;
  gap: 16px;
  font-size: 13px;
  flex-wrap: wrap;
}

.footer-links a {
  color: var(--ink-slate);
  text-decoration: none;
  transition: color var(--duration-fast) var(--ease-out);
}

.footer-links a:hover { color: var(--ink); }
</style>
</head>
<body>

<div class="settings-card fade-in" id="settingsCard">
  <div class="loading-state" id="loadingState">
    <div class="loading-spinner"></div>
    Loading settings...
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================== */
/*  State                                                              */
/* ================================================================== */
const state = {
  status: null,
  detect: null,
  config: null,
  memoryCount: null,
  workStatus: null,
  serverStatus: null,
  loaded: false,
  // Providers
  providers: [],
  selectedProvider: null,
  providerKeyInput: '',
  savingProvider: null,
  providerSaveResult: null,
};

const API = '/distro';

/* ================================================================== */
/*  API Helpers                                                        */
/* ================================================================== */
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API + path, opts);
    if (!res.ok) return { error: 'HTTP ' + res.status };
    return await res.json();
  } catch (e) {
    return { error: e.message };
  }
}

async function coreApi(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch('/api' + path, opts);
    if (!res.ok) return { error: 'HTTP ' + res.status };
    return await res.json();
  } catch (e) {
    return { error: e.message };
  }
}

/* ================================================================== */
/*  Load Data                                                          */
/* ================================================================== */
async function loadAll() {
  const [statusData, detectData, configData, memoryData, workData, serverData, provData] = await Promise.all([
    api('GET', '/preflight'),
    fetch('/distro/detect').then(r => r.ok ? r.json() : { error: 'HTTP ' + r.status }).catch(() => ({ error: true })),
    api('GET', '/distro-settings'),
    // TODO: restore when amplifierd exposes /api/memory/* routes.
    // coreApi('GET', '/memory/stats').catch(() => ({ error: true })),
    // coreApi('GET', '/memory/work-status'),
    Promise.resolve({ error: true }),
    Promise.resolve({ error: true }),
    api('GET', '/preflight'),
    api('GET', '/providers'),
  ]);
  state.status = statusData.error ? null : statusData;
  state.detect = detectData.error ? null : detectData;
  state.config = (configData && !configData.error && configData.settings) ? configData.settings : null;
  state.memoryCount = (memoryData && !memoryData.error && memoryData.count != null) ? memoryData.count : null;
  state.workStatus = (workData && !workData.error) ? workData : null;
  state.serverStatus = (serverData && !serverData.error) ? serverData : null;
  if (provData && !provData.error && provData.providers) state.providers = provData.providers;

  // Consolidate API key checks from detect data into the system checks list.
  // Git, GitHub, and CLI are already covered by the preflight endpoint — skip them.
  if (state.serverStatus) {
    const checks = (state.serverStatus.checks || []).slice();
    const existingNames = new Set(checks.map(c => c.name.toLowerCase()));
    const keyLabels = { anthropic: 'Anthropic API Key', openai: 'OpenAI API Key' };
    const apiKeys = (state.detect && state.detect.api_keys) || {};
    Object.entries(apiKeys).forEach(([key, present]) => {
      const name = keyLabels[key] || (key.charAt(0).toUpperCase() + key.slice(1) + ' API Key');
      if (!existingNames.has(name.toLowerCase())) {
        checks.push({
          name: name,
          passed: !!present,
          message: present ? 'Key configured' : 'Key not set in environment',
          severity: present ? 'ok' : 'warning',
        });
      }
    });
    state.serverStatus.checks = checks;
    if (checks.length > 0) {
      state.serverStatus.passed = checks.every(c => c.passed);
    }
  }

  state.loaded = true;
  render();
}

/* ================================================================== */
/*  Normalize API Data                                                 */
/* ================================================================== */
function featuresAsArray(featuresObj) {
  if (!featuresObj || Array.isArray(featuresObj)) return featuresObj || [];
  return Object.entries(featuresObj).map(([id, f]) => ({
    id,
    enabled: f.enabled,
    tier: f.tier,
    name: f.name || id,
    description: f.description || '',
  }));
}

/* ================================================================== */
/*  Feature Toggle                                                     */
/* ================================================================== */
async function toggleFeature(featureId, enabled) {
  const toggle = document.querySelector('[data-feature="' + featureId + '"] .toggle');
  if (toggle) toggle.classList.add('saving');

  const res = await api('POST', '/features', { feature_id: featureId, enabled: enabled });

  if (res && !res.error) {
    if (state.status && state.status.features) {
      if (state.status.features[featureId]) {
        state.status.features[featureId].enabled = enabled;
      }
    }
    showToast(enabled ? 'Enabled' : 'Disabled', 'success');
  } else {
    showToast('Failed to update', 'error');
  }

  if (toggle) toggle.classList.remove('saving');
  render();
}

/* ================================================================== */
/*  Set Tier                                                           */
/* ================================================================== */
async function setTier(tierLevel) {
  const btn = document.getElementById('tierBtn' + tierLevel);
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Enabling...';
  }

  const res = await api('POST', '/tier', { tier: tierLevel });

  if (res && !res.error) {
    const statusData = await api('GET', '/status');
    if (!statusData.error) state.status = statusData;
    showToast('Tier ' + tierLevel + ' features enabled', 'success');
  } else {
    showToast('Failed to enable tier', 'error');
  }

  render();
}

/* ================================================================== */
/*  Save Config                                                        */
/* ================================================================== */
async function saveConfig(field) {
  const el = document.getElementById('cfg-' + field);
  if (!el) return;
  const value = el.value.trim();
  let body = {};

  if (field === 'workspace_root') {
    body = { workspace_root: value };
  } else if (field === 'github_handle') {
    body = { identity: { github_handle: value } };
  } else if (field === 'git_email') {
    body = { identity: { git_email: value } };
  }

  const btn = document.getElementById('btn-save-' + field);
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

  const res = await api('POST', '/distro-settings', body);

  if (res && !res.error) {
    state.config = (res.settings) ? res.settings : res;
    showToast('Saved', 'success');
  } else {
    showToast('Failed to save', 'error');
  }

  if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
}

/* ================================================================== */
/*  Test Provider                                                      */
/* ================================================================== */
async function testProvider(providerId) {
  const btn = document.getElementById('btn-test-' + providerId);
  if (btn) { btn.disabled = true; btn.textContent = 'Testing...'; }

  const res = await coreApi('POST', '/test-provider', { provider: providerId });

  if (res && res.ok) {
    showToast(providerId + ' connection OK', 'success');
  } else {
    const msg = (res && res.error) ? res.error : 'Connection failed (status ' + (res && res.status_code) + ')';
    showToast(msg, 'error');
  }

  if (btn) { btn.disabled = false; btn.textContent = 'Test'; }
}

/* ================================================================== */
/*  Toast                                                              */
/* ================================================================== */
let toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  void el.offsetWidth;
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), 2500);
}

/* ================================================================== */
/*  Render                                                             */
/* ================================================================== */
function render() {
  const card = document.getElementById('settingsCard');

  if (!state.loaded) return;

  const status = state.status || {};
  const detect = state.detect || {};
  const config = state.config || {};
  const features = featuresAsArray(status.features);
  const tier1 = features.filter(f => f.tier === 1);
  const tier2 = features.filter(f => f.tier === 2);

  card.innerHTML = renderHeader()
    + renderConfigSection(config)
    + '<hr class="section-divider">'
    + renderProviders()
    + '<hr class="section-divider">'
    + renderFeatureSection('Recommended', tier1, features.length > 0)
    + renderTierAction(1, tier1)
    + '<hr class="section-divider">'
    + renderFeatureSection('Power User', tier2, features.length > 0)
    + renderTierAction(2, tier2)
    + '<hr class="section-divider">'
    + renderMemoryStats()
    + '<hr class="section-divider">'
    + renderPreflightChecks()
    + renderFooter();

  bindEvents();

  // Re-init auth widget after each render (innerHTML wipes the DOM each time)
  if (window.AmplifierAuth) {
    AmplifierAuth.init({ container: document.getElementById('auth-slot') });
  }
}

/* ------------------------------------------------------------------ */
/*  Header                                                             */
/* ------------------------------------------------------------------ */
function renderHeader() {
  return '<div class="wordmark-wrapper">'
    + '<h1 class="wordmark wordmark-sm">amplifier</h1>'
    + '<p style="color: var(--ink-slate); font-size: 1.1rem; margin-top: 8px;">Settings</p>'
    + '</div>'
    + '<div class="header" style="margin-top: 24px; margin-bottom: 0;">'
    + '<div></div>'
    + '<div class="header-actions">'
    + '<span id="auth-slot"></span>'
    + '<a href="/distro/">Back to Dashboard</a>'
    + '<span id="feedback-slot"></span>'
    + '</div>'
    + '</div>';
}

/* ------------------------------------------------------------------ */
/*  Preflight Checks                                                   */
/* ------------------------------------------------------------------ */
function renderPreflightChecks() {
  const ss = state.serverStatus || {};
  const checks = ss.checks || [];
  const passedCount = checks.filter(c => c.passed).length;
  const totalCount = checks.length;
  const allPassed = ss.passed !== false;
  const phase = state.status && state.status.phase ? state.status.phase : '--';

  // Summary bar
  const summaryColor = allPassed ? 'var(--success)' : 'var(--warning)';
  const summaryIcon = allPassed ? 'OK' : 'WARN';

  let html = '<div class="section">'
    + '<div class="section-title">System Checks</div>'
    + '<div class="preflight-summary">'
    + '<div class="preflight-summary-left">'
    +   '<span class="preflight-status-icon" style="color:' + summaryColor + ';">' + summaryIcon + '</span>'
    +   '<span class="preflight-count">'
    +     '<strong>' + passedCount + '/' + totalCount + '</strong> checks passed'
    +   '</span>'
    + '</div>'
    + '<span class="preflight-phase">' + esc(phase) + '</span>'
    + '</div>';

  // Individual checks
  if (totalCount > 0) {
    html += '<div class="check-list">';
    checks.forEach(function(c) {
      var icon, iconColor, rowClass;
      if (c.passed) {
        icon = '&#10003;';
        iconColor = 'var(--success)';
        rowClass = 'check-passed';
      } else if (c.severity === 'warning') {
        icon = '!';
        iconColor = 'var(--warning)';
        rowClass = 'check-warn';
      } else {
        icon = '&#10005;';
        iconColor = 'var(--error)';
        rowClass = 'check-fail';
      }

      html += '<div class="check-row ' + rowClass + '">'
        + '<span class="check-icon" style="color:' + iconColor + ';">' + icon + '</span>'
        + '<span class="check-name">' + esc(c.name) + '</span>'
        + '<span class="check-message">' + esc(c.message) + '</span>'
        + '</div>';
    });
    html += '</div>';
  } else {
    html += '<div style="color: var(--ink-slate); font-size: 13px; padding: 20px 0;">'
      + 'No check data available. The server may still be initializing.'
      + '</div>';
  }

  html += '</div>';
  return html;
}

/* ------------------------------------------------------------------ */
/*  Config Section                                                     */
/* ------------------------------------------------------------------ */
function renderConfigSection(config) {
  const ws = config.workspace_root || '~/dev';
  const gh = (config.identity && config.identity.github_handle) || '';
  const ge = (config.identity && config.identity.git_email) || '';

  return '<div class="section">'
    + '<div class="section-title">Configuration</div>'
    + '<div class="config-group">'

    + '<div class="config-field">'
    + '<label>Workspace Root</label>'
    + '<div class="field-row">'
    + '<input type="text" id="cfg-workspace_root" value="' + esc(ws) + '" placeholder="~/dev">'
    + '<button class="btn-save" id="btn-save-workspace_root" onclick="saveConfig(\'workspace_root\')">Save</button>'
    + '</div></div>'

    + '<div class="config-field">'
    + '<label>GitHub Handle</label>'
    + '<div class="field-row">'
    + '<input type="text" id="cfg-github_handle" value="' + esc(gh) + '" placeholder="your-github-handle">'
    + '<button class="btn-save" id="btn-save-github_handle" onclick="saveConfig(\'github_handle\')">Save</button>'
    + '</div></div>'

    + '<div class="config-field">'
    + '<label>Git Email</label>'
    + '<div class="field-row">'
    + '<input type="text" id="cfg-git_email" value="' + esc(ge) + '" placeholder="you@example.com">'
    + '<button class="btn-save" id="btn-save-git_email" onclick="saveConfig(\'git_email\')">Save</button>'
    + '</div></div>'

    + '</div></div>';
}

/* ------------------------------------------------------------------ */
/*  Providers                                                          */
/* ------------------------------------------------------------------ */
function renderProviders() {
  const providers = state.providers || [];
  if (providers.length === 0) {
    return '<div class="section">'
      + '<div class="section-title">Providers</div>'
      + '<div style="color: var(--ink-slate); font-size: 13px; padding: 20px 0;">'
      + 'Provider information not available.'
      + '</div></div>';
  }

  let html = '<div class="section">'
    + '<div class="section-title">Providers</div>'
    + '<div class="provider-grid">';

  providers.forEach(p => {
    const isSelected = state.selectedProvider === p.id;
    const saveResult = state.providerSaveResult && state.providerSaveResult.id === p.id
      ? state.providerSaveResult : null;
    const placeholder = p.key_prefix ? p.key_prefix + '...' : 'Paste API key';

    html += '<div class="provider-card' + (p.configured ? ' configured' : '') + '" data-settings-provider="' + esc(p.id) + '">'
      + '<div class="provider-card-header">'
      +   '<h4>' + esc(p.name) + '</h4>'
      +   (p.configured ? '<span class="provider-badge configured">Connected</span>'
           : p.has_key ? '<span class="provider-badge detected">Key Detected</span>' : '')
      + '</div>'
      + '<p>' + esc(p.description) + '</p>';

    // "Use This Key" for detected but not configured
    if (p.has_key && !p.configured) {
      html += '<div class="provider-env-row">'
        + '<span class="env-hint">Key found in environment</span>'
        + '<button class="btn-sm btn-secondary" data-provider-use="' + esc(p.id) + '"'
        +   (state.savingProvider === p.id ? ' disabled' : '') + '>'
        +   (state.savingProvider === p.id ? 'Setting up...' : 'Use This Key')
        + '</button></div>';
    }

    // "Get an API key" link for unconfigured providers without a key
    if (!p.configured && !p.has_key) {
      html += '<div style="margin-top: 8px;">'
        + '<a href="' + esc(p.console_url) + '" target="_blank" rel="noopener" '
        + 'style="font-size: 12px; color: var(--signal);">Get an API key</a></div>';
    }

    // Key input row (when card is expanded)
    if (isSelected) {
      html += '<div class="provider-key-row">'
        + '<input type="password" data-provider-key="' + esc(p.id) + '"'
        +   ' placeholder="' + esc(placeholder) + '" value="' + esc(state.providerKeyInput) + '">'
        + '<button class="btn-sm btn-secondary" data-provider-save="' + esc(p.id) + '"'
        +   (state.savingProvider === p.id ? ' disabled' : '') + '>'
        +   (state.savingProvider === p.id ? 'Saving...' : p.configured ? 'Update' : 'Add Key')
        + '</button></div>';
    }

    // Test button for configured providers
    if (p.configured) {
      html += '<div class="provider-card-actions">'
        + '<button class="btn-test" id="btn-test-' + esc(p.id) + '" onclick="testProvider(\'' + esc(p.id) + '\')">Test</button>'
        + '<span class="status-badge connected"><span class="status-dot"></span> Connected</span>'
        + '</div>';
    }

    // Save result message
    if (saveResult) {
      html += '<div class="provider-save-msg ' + (saveResult.ok ? 'ok' : 'fail') + '">'
        + esc(saveResult.message) + '</div>';
    }

    html += '</div>';
  });

  html += '</div></div>';
  return html;
}

/* ------------------------------------------------------------------ */
/*  Features Section                                                   */
/* ------------------------------------------------------------------ */
function renderFeatureSection(title, features, hasFeatures) {
  if (!hasFeatures) {
    return '<div class="section">'
      + '<div class="section-title">' + esc(title) + ' Features</div>'
      + '<div style="color: var(--ink-slate); font-size: 13px; padding: 20px 0;">'
      + 'Feature information not available. The server may still be initializing.'
      + '</div></div>';
  }

  if (features.length === 0) {
    return '<div class="section">'
      + '<div class="section-title">' + esc(title) + ' Features</div>'
      + '<div style="color: var(--ink-slate); font-size: 13px; padding: 12px 0;">'
      + 'No features in this tier.'
      + '</div></div>';
  }

  let html = '<div class="section">'
    + '<div class="section-title">' + esc(title) + ' Features</div>'
    + '<div class="feature-list">';

  features.forEach(f => {
    const on = f.enabled ? ' on' : '';
    html += '<div class="feature-row" data-feature="' + esc(f.id) + '">'
      + '<div class="toggle' + on + '" data-toggle="' + esc(f.id) + '">'
      + '<div class="toggle-knob"></div></div>'
      + '<div class="feature-info">'
      + '<div class="feature-name">' + esc(f.name || f.id) + '</div>'
      + (f.description ? '<div class="feature-desc">' + esc(f.description) + '</div>' : '')
      + '</div></div>';
  });

  html += '</div></div>';
  return html;
}

/* ------------------------------------------------------------------ */
/*  Tier Action                                                        */
/* ------------------------------------------------------------------ */
function renderTierAction(tierLevel, tierFeatures) {
  if (tierFeatures.length === 0) return '';

  const allEnabled = tierFeatures.every(f => f.enabled);
  const label = tierLevel === 1 ? 'Recommended' : 'Power User';

  if (allEnabled) {
    return '<div class="tier-action">'
      + '<div style="text-align: center; font-size: 13px; color: var(--success); padding: 8px 0;">'
      + 'All ' + esc(label.toLowerCase()) + ' features enabled'
      + '</div></div>';
  }

  return '<div class="tier-action">'
    + '<button class="btn-tier" id="tierBtn' + tierLevel + '" onclick="setTier(' + tierLevel + ')">'
    + 'Enable All ' + esc(label) + '</button></div>';
}

/* ------------------------------------------------------------------ */
/*  Memory Stats                                                       */
/* ------------------------------------------------------------------ */
function renderMemoryStats() {
  const memCount = state.memoryCount != null ? state.memoryCount : '--';
  const workItems = state.workStatus && state.workStatus.items ? state.workStatus.items.length : 0;

  let lastUpdate = '--';
  if (state.workStatus && state.workStatus.items && state.workStatus.items.length > 0) {
    const maxTs = Math.max(...state.workStatus.items
      .filter(i => i.updated)
      .map(i => new Date(i.updated).getTime()));
    if (isFinite(maxTs)) {
      try {
        const d = new Date(maxTs);
        lastUpdate = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
      } catch (e) { lastUpdate = '--'; }
    }
  }

  return '<div class="section">'
    + '<div class="section-title">Memory</div>'
    + '<div class="stats-grid">'
    + '<div class="stat-card">'
    + '<div class="stat-value">' + esc(String(memCount)) + '</div>'
    + '<div class="stat-label">Memories</div>'
    + '</div>'
    + '<div class="stat-card">'
    + '<div class="stat-value">' + workItems + '</div>'
    + '<div class="stat-label">Work Items</div>'
    + '</div>'
    + '<div class="stat-card">'
    + '<div class="stat-value" style="font-size: 14px;">' + esc(lastUpdate) + '</div>'
    + '<div class="stat-label">Last Update</div>'
    + '</div>'
    + '</div></div>';
}

/* ------------------------------------------------------------------ */
/*  Environment                                                        */
/* ------------------------------------------------------------------ */
function renderEnvironment(detect) {
  const tools = [
    { name: 'Git',           found: detect.git && detect.git.configured },
    { name: 'GitHub',        found: detect.github && detect.github.authenticated, detail: detect.github && detect.github.user },
    { name: 'Amplifier CLI', found: detect.cli_installed },
    { name: 'Anthropic Key', found: detect.api_keys && detect.api_keys.anthropic },
    { name: 'OpenAI Key', found: detect.api_keys && detect.api_keys.openai },
  ];

  let html = '<div class="section">'
    + '<div class="section-title">Environment</div>'
    + '<div class="env-grid">';

  tools.forEach(t => {
    const badgeClass = t.found ? 'found' : 'missing';
    const badgeLabel = t.found ? (t.detail || 'Found') : 'Not found';
    html += '<div class="env-item">'
      + '<span class="env-name">' + esc(t.name) + '</span>'
      + '<span class="env-badge ' + badgeClass + '">' + esc(badgeLabel) + '</span>'
      + '</div>';
  });

  html += '</div></div>';
  return html;
}

/* ------------------------------------------------------------------ */
/*  Footer                                                             */
/* ------------------------------------------------------------------ */
function renderFooter() {
  return '<div class="footer-links">'
    + '<a href="/distro/setup">Setup Wizard</a>'
    + '<a href="https://withamplifier.com/learn" target="_blank">Tutorial</a>'
    + '<a href="https://github.com/microsoft/amplifier/tree/main/docs" target="_blank">Docs</a>'
    + '<a href="https://withamplifier.com/stories" target="_blank">Stories</a>'
    + '</div>';
}

/* ================================================================== */
/*  Event Binding                                                      */
/* ================================================================== */
function bindEvents() {
  // Feature toggles
  document.querySelectorAll('[data-toggle]').forEach(toggle => {
    toggle.addEventListener('click', () => {
      const featureId = toggle.dataset.toggle;
      const isOn = toggle.classList.contains('on');
      toggleFeature(featureId, !isOn);
    });
  });

  // Provider card selection (expand key input)
  document.querySelectorAll('[data-settings-provider]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') return;
      if (e.target.closest('.provider-key-row')) return;
      if (e.target.closest('.provider-env-row')) return;
      if (e.target.closest('.provider-card-actions')) return;
      const pid = card.dataset.settingsProvider;
      if (state.selectedProvider === pid) {
        state.selectedProvider = null;
      } else {
        state.selectedProvider = pid;
        state.providerKeyInput = '';
        state.providerSaveResult = null;
      }
      render();
    });
  });

  // Provider key input binding
  document.querySelectorAll('[data-provider-key]').forEach(el => {
    el.addEventListener('input', () => {
      state.providerKeyInput = el.value;
    });
  });

  // "Use This Key" buttons
  document.querySelectorAll('[data-provider-use]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const pid = btn.dataset.providerUse;
      state.savingProvider = pid;
      state.providerSaveResult = null;
      render();
      const res = await api('POST', '/provider', { provider: pid });
      state.savingProvider = null;
      if (res && !res.error && res.verified) {
        const prov = state.providers.find(p => p.id === (res.provider || pid));
        if (prov) prov.configured = true;
        let msg = res.provider_name + ' configured using existing key';
        if (res.overlay_error) msg += ' (overlay not updated: ' + res.overlay_error + ')';
        state.providerSaveResult = { id: res.provider || pid, ok: !res.overlay_error, message: msg };
      } else {
        const detail = (res && res.detail) || 'Failed to register provider.';
        state.providerSaveResult = { id: pid, ok: false, message: detail };
      }
      render();
    });
  });

  // Provider save key buttons
  document.querySelectorAll('[data-provider-save]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const pid = btn.dataset.providerSave;
      if (!state.providerKeyInput.trim()) return;
      state.savingProvider = pid;
      state.providerSaveResult = null;
      render();
      const res = await api('POST', '/provider', {
        provider: pid,
        api_key: state.providerKeyInput,
      });
      state.savingProvider = null;
      if (res && !res.error && res.verified) {
        const prov = state.providers.find(p => p.id === (res.provider || pid));
        if (prov) prov.configured = true;
        let msg = res.provider_name + ' configured';
        if (res.overlay_error) msg += ' (overlay not updated: ' + res.overlay_error + ')';
        state.providerSaveResult = { id: res.provider || pid, ok: !res.overlay_error, message: msg };
        state.providerKeyInput = '';
        if (!res.overlay_error) state.selectedProvider = null;
      } else {
        const detail = (res && res.detail) || 'Failed to save key.';
        state.providerSaveResult = { id: pid, ok: false, message: detail };
      }
      render();
    });
  });
}

/* ================================================================== */
/*  Utilities                                                          */
/* ================================================================== */
function esc(str) {
  if (str == null) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

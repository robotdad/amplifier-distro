<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Amplifier Distro</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/amplifier-theme.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow-lg);
  }

  .login-card h1 {
    font-size: 1.5rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 0.25rem;
    color: var(--text-primary);
  }

  .login-card .subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.875rem;
    margin-bottom: 1.5rem;
  }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-group label {
    display: block;
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.375rem;
  }

  .form-group input {
    width: 100%;
    padding: 0.625rem 0.75rem;
    font-size: 0.9375rem;
    font-family: var(--font);
    color: var(--text-primary);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.15s ease;
  }

  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-bg);
  }

  .btn-sign-in {
    display: block;
    width: 100%;
    padding: 0.625rem;
    margin-top: 1.25rem;
    font-size: 0.9375rem;
    font-weight: 600;
    font-family: var(--font);
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background-color 0.15s ease;
  }

  .btn-sign-in:hover {
    background: var(--accent-hover);
  }

  .error-msg {
    display: none;
    margin-top: 1rem;
    padding: 0.625rem 0.75rem;
    font-size: 0.8125rem;
    color: var(--error);
    background: var(--error-bg);
    border: 1px solid var(--error);
    border-radius: var(--radius-sm);
    text-align: center;
  }
</style>
</head>
<body>

<div class="login-card">
  <h1>Amplifier Distro</h1>
  <p class="subtitle">Sign in with your system account</p>

  <form id="login-form" method="post" action="/login">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-sign-in">Sign in</button>
  </form>

  <div id="error-display" class="error-msg"></div>
</div>

<script>
(function () {
  var form = document.getElementById('login-form');
  var errorDiv = document.getElementById('error-display');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errorDiv.style.display = 'none';
    errorDiv.textContent = '';

    // Preserve ?next= param so the POST redirect lands on the original page
    var loginUrl = '/login' + window.location.search;

    fetch(loginUrl, {
      method: 'POST',
      body: new FormData(form),
      redirect: 'follow'
    })
    .then(function (resp) {
      if (resp.redirected) {
        window.location.href = resp.url;
        return;
      }
      if (resp.status === 401) {
        return resp.json().then(function (data) {
          errorDiv.textContent = data.error || 'Invalid username or password';
          errorDiv.style.display = 'block';
        });
      }
      errorDiv.textContent = 'Unexpected response (' + resp.status + ')';
      errorDiv.style.display = 'block';
    })
    .catch(function (err) {
      errorDiv.textContent = 'Network error: ' + err.message;
      errorDiv.style.display = 'block';
    });
  });
})();
</script>

</body>
</html>

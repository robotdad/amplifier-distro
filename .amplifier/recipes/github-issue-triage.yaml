# =============================================================================
# GitHub Issue Triage Recipe (Incremental)
# =============================================================================
#
# Automated workflow for triaging GitHub issues against merged PRs.
# Supports incremental operation — detects existing triage findings posted
# to issues and skips re-investigation unless explicitly requested.
#
# Fetches open issues (with comments) and merged PRs, cross-references them,
# detects prior triage findings via hidden HTML markers, investigates the
# current code state per issue, verifies PR fixes by reading actual diffs,
# cross-validates all findings with a second LLM provider, posts findings
# as comments to GitHub issues, and compiles everything into a structured
# triage report.
#
# Requirements:
#   - GitHub CLI (gh) installed and authenticated with repo access
#   - foundation bundle (provides zen-architect agent)
#   - At least one LLM provider configured (two recommended for cross-validation)
#   - jq installed (for JSON processing in bash steps)
#
# Usage:
#   amplifier run "execute github-issue-triage.yaml \
#     with repo_path=/path/to/repo repo_name=org/repo"
#
# Context variables:
#   - repo_path (required):  Local filesystem path to the cloned git repository
#   - repo_name (required):  GitHub org/repo identifier (e.g., "microsoft/amplifier")
#   - focus (optional):      Label filter — "bugs", "enhancements", or "all" (default: "all")
#   - max_issues (optional): Max issues to fetch; empty string = up to 200 (default: "")
#   - batch_size (optional): Issues per investigation batch (default: "5")
#   - report_path (optional): Output file path (default: <repo_path>/triage-reports/triage-report-<timestamp>.md)
#
# Stages:
#   1. discovery       — Fetch issues (with comments)/PRs, detect existing findings,
#                         cross-reference, produce initial triage
#                         [APPROVAL GATE: user selects which issues to investigate;
#                          default "new" skips previously investigated issues]
#   2. investigation   — Deep code investigation, PR diff verification, cross-review
#                         [APPROVAL GATE: user reviews findings before proceeding]
#   3. post-findings   — Format triage findings as GitHub issue comments
#                         [APPROVAL GATE: user reviews comments before posting]
#   4. report          — Post finding comments to GitHub, synthesize findings,
#                         write triage report to file
#
# Incremental behavior:
#   Issues with an existing <!-- amplifier-triage-finding --> comment are detected
#   during discovery. By default ("new"), they are skipped during investigation.
#   Users can override with "all" to re-investigate, or specify issue numbers.
#   Finding comments are only posted for issues that don't already have one.
#
# Typical runtime: 15-50 minutes depending on issue count
#
# Provider strategy:
#   - Investigation steps prefer Anthropic (Provider A)
#   - Cross-review step prefers OpenAI (Provider B) for independent validation
#   - All steps include fallbacks so the recipe works with a single provider
#
# =============================================================================
# CHANGELOG
# =============================================================================
#
# v1.1.0 (2026-03-05):
#   - NEW FEATURE: Incremental triage with existing finding detection
#     * fetch-open-issues now fetches issue comments alongside metadata
#     * cross-reference step detects <!-- amplifier-triage-finding --> markers
#       in comments and categorizes issues with HAS_FINDING status
#     * Default approval behavior changed from "all" to "new" — previously
#       investigated issues are skipped by default
#   - NEW FEATURE: Post-findings stage with approval gate (new stage 3)
#     * Formats triage findings as GitHub-compatible markdown comments
#     * Each comment starts with hidden <!-- amplifier-triage-finding --> marker
#       for future incremental detection
#     * Posts findings via `gh issue comment` with --body-file for safe handling
#     * Approval gate allows review of all comments before posting
#     * Issues with existing findings are automatically excluded from posting
#   - IMPROVEMENT: Investigation stage respects existing findings
#     * "new" (default): only investigate issues without existing findings
#     * "all": re-investigate everything including previously investigated
#     * "unsolved": NO_LINKED_PR issues without existing findings
#     * Comma-separated issue numbers: always investigated regardless of status
#     * Investigation plan now tracks skipped issues for the report
#   - IMPROVEMENT: Report includes "Previously Investigated" section
#     * Shows issues skipped due to existing findings with their existing verdict
#     * Provides context on prior investigations without re-running them
#
# v1.0.0 (2026-03-05):
#   - Initial recipe implementation
#   - Three-stage workflow with two approval gates
#   - Cross-provider validation (Anthropic for investigation, OpenAI for review)
#   - Batch processing for efficient issue investigation
#   - Automatic PR diff verification for linked PRs
#   - Atomic file write for report output
#   - Rate limiting to prevent API throttling
#
# =============================================================================

name: "github-issue-triage"
description: "Incremental GitHub issue triage: detects existing findings to avoid re-investigation, cross-references open issues against merged PRs, investigates code state in batches, verifies PR fixes via diffs, cross-validates across providers, posts findings as issue comments, and generates a structured report"
version: "1.1.0"
tags: ["github", "triage", "issues", "cross-validation", "report", "incremental"]

context:
  repo_path: "."          # Local path to the cloned git repo (default: current directory)
  repo_name: "microsoft/amplifier-distro"  # GitHub org/repo
  focus: "all"            # Optional: "bugs", "enhancements", or "all"
  max_issues: ""          # Optional: max issues to fetch ("" = up to 200)
  batch_size: "5"         # Optional: issues per investigation batch (5-10 recommended)
  report_path: ""         # Optional: output path (default: <repo_path>/triage-reports/triage-report-<ts>.md)
  _approval_message: "new"  # Runtime: set by approval gate (default: skip previously investigated)

rate_limiting:
  max_concurrent_llm: 3
  min_delay_ms: 500
  backoff:
    enabled: true
    initial_delay_ms: 2000
    max_delay_ms: 60000
    multiplier: 2.0

stages:
  # ===========================================================================
  # STAGE 1: DISCOVERY
  # Fetch issues (with comments) and PRs from GitHub, detect existing findings,
  # cross-reference, produce initial triage.
  # ===========================================================================
  - name: "discovery"
    steps:
      # --- Fetch all open issues from GitHub (including comments for finding detection) ---
      - id: "fetch-open-issues"
        type: "bash"
        command: |
          set -euo pipefail
          cd "{{repo_path}}"

          focus="{{focus}}"
          max_issues="{{max_issues}}"

          # Build label filter based on focus area
          label_filter=""
          if [ "$focus" = "bugs" ]; then
            label_filter="--label bug"
          elif [ "$focus" = "enhancements" ]; then
            label_filter="--label enhancement"
          fi

          # Build limit flag
          if [ -n "$max_issues" ] && [ "$max_issues" != "0" ]; then
            limit_flag="--limit $max_issues"
          else
            limit_flag="--limit 200"
          fi

          gh issue list --repo "{{repo_name}}" --state open \
            --json number,title,body,labels,comments \
            $label_filter $limit_flag
        output: "open_issues"
        parse_json: true
        timeout: 120

      # --- Fetch recently merged PRs ---
      - id: "fetch-merged-prs"
        type: "bash"
        command: |
          set -euo pipefail
          cd "{{repo_path}}"

          gh pr list --repo "{{repo_name}}" --state merged \
            --json number,title,body \
            --limit 200
        output: "merged_prs"
        parse_json: true
        timeout: 120

      # --- Cross-reference issues against merged PRs + detect existing findings ---
      - id: "cross-reference"
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          You are triaging GitHub issues for **{{repo_name}}**.

          ## Open Issues (focus: {{focus}})
          {{open_issues}}

          ## Recently Merged PRs
          {{merged_prs}}

          ## Task

          Cross-reference every open issue against the merged PRs AND check for
          existing triage findings in the issue comments.

          ### Step 1: Detect Existing Triage Findings

          For each issue, examine its `comments` array. Look for any comment whose
          `body` starts with `<!-- amplifier-triage-finding -->` on the **first line**.

          - If found: set `has_existing_finding` to `true`, extract the verdict
            (SOLVED / PARTIALLY_SOLVED / UNSOLVED) from the comment body, and include
            the full comment body as `existing_finding_text`.
          - If the `comments` array is empty or no comment has the marker:
            set `has_existing_finding` to `false`, and set `existing_finding_verdict`
            and `existing_finding_text` to `null`.

          ### Step 2: Cross-Reference with Merged PRs

          1. Check if any PR title or body references the issue (e.g., "fixes #123", "closes #45")
          2. Check for semantic matches — PRs that change the same area or address the same problem
          3. Assign an initial assessment per issue:
             - **LIKELY_FIXED** — A merged PR clearly targets this issue
             - **POSSIBLY_FIXED** — A merged PR may partially or indirectly address it
             - **NO_LINKED_PR** — No merged PR appears related

          Return ONLY a JSON array, no markdown fences, no commentary:

          [
            {
              "issue_number": 123,
              "issue_title": "Short title",
              "labels": ["bug"],
              "initial_assessment": "LIKELY_FIXED",
              "linked_prs": [45, 67],
              "reasoning": "PR #45 title mentions fixing the auth timeout from this issue",
              "has_existing_finding": false,
              "existing_finding_verdict": null,
              "existing_finding_text": null
            }
          ]

          Sort by: issues WITHOUT existing findings first, then by assessment
          (NO_LINKED_PR first, then POSSIBLY_FIXED, then LIKELY_FIXED).
        output: "initial_triage"
        parse_json: true
        timeout: 900

    approval:
      required: true
      prompt: |
        ## Initial Triage Complete

        {{initial_triage}}

        ---
        **Note:** Issues marked with `has_existing_finding: true` have been
        previously investigated. Their existing verdict is shown above.

        **Select issues for deep investigation.** Approve with one of:

        - **"new"** — Only investigate issues WITHOUT existing findings *(DEFAULT)*
        - **"all"** — Re-investigate everything including previously investigated
        - **"unsolved"** — Investigate only NO_LINKED_PR issues (excludes existing findings)
        - **"12,34,56"** — Investigate specific issue numbers (comma-separated)

        Or **deny** to stop the workflow.
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 2: INVESTIGATION
  # Deep code investigation, PR diff verification, cross-provider review.
  # ===========================================================================
  - name: "investigation"
    steps:
      # --- Prepare investigation plan from user's approval selection ---
      - id: "prepare-investigation"
        type: "bash"
        command: |
          set -euo pipefail

          selection="{{_approval_message}}"

          # Write triage JSON safely via heredoc to avoid shell quoting issues
          _triage_tmp=$(mktemp)
          cat > "$_triage_tmp" << 'TRIAGE_JSON_EOF_7a3e9b'
          {{initial_triage}}
          TRIAGE_JSON_EOF_7a3e9b
          triage=$(cat "$_triage_tmp")
          rm -f "$_triage_tmp"

          # Default to "new" if user approved without a message
          if [ -z "$selection" ]; then
            selection="new"
          fi

          # Identify issues with and without existing findings
          has_finding=$(echo "$triage" | jq -c \
            '[.[] | select(.has_existing_finding == true)]')
          no_finding=$(echo "$triage" | jq -c \
            '[.[] | select(.has_existing_finding != true)]')

          # Filter issues based on user's selection
          if [ "$selection" = "new" ]; then
            # Only issues WITHOUT existing findings
            selected=$(echo "$no_finding" | jq -c '.')
          elif [ "$selection" = "all" ]; then
            # All issues including previously investigated
            selected=$(echo "$triage" | jq -c '.')
          elif [ "$selection" = "unsolved" ]; then
            # NO_LINKED_PR issues without existing findings
            selected=$(echo "$no_finding" | jq -c \
              '[.[] | select(.initial_assessment == "NO_LINKED_PR")]')
          else
            # Parse comma-separated issue numbers (explicit selection)
            numbers=$(echo "$selection" | tr ',' '\n' \
              | sed 's/[^0-9]//g' \
              | jq -R 'select(length > 0) | tonumber' \
              | jq -sc '.')
            selected=$(echo "$triage" | jq -c --argjson nums "$numbers" \
              '[.[] | select(.issue_number as $n | $nums | index($n))]')
          fi

          # Track HAS_FINDING issues that were NOT selected for investigation
          skipped_findings=$(jq -nc \
            --argjson has "$has_finding" \
            --argjson sel "$selected" \
            '[$has[] | select(.issue_number as $n |\
              [$sel[].issue_number] | index($n) | not)]')

          # Split selected issues into batches
          batch_size={{batch_size}}
          batches=$(echo "$selected" | jq -c \
            "[range(0; length; $batch_size) as \$i | .[\$i:\$i+$batch_size]]")

          # Extract issues with linked PRs (for PR diff verification)
          issues_with_prs=$(echo "$selected" | jq -c \
            '[.[] | select(.linked_prs | length > 0)]')
          pr_batches=$(echo "$issues_with_prs" | jq -c \
            "[range(0; length; $batch_size) as \$i | .[\$i:\$i+$batch_size]]")

          # Output the investigation plan
          jq -n \
            --argjson batches "$batches" \
            --argjson pr_batches "$pr_batches" \
            --argjson total "$(echo "$selected" | jq 'length')" \
            --argjson with_prs "$(echo "$issues_with_prs" | jq 'length')" \
            --argjson skipped_has_finding "$skipped_findings" \
            --argjson skipped_count "$(echo "$skipped_findings" | jq 'length')" \
            '{
              batches: $batches,
              pr_batches: $pr_batches,
              total_issues: $total,
              issues_with_prs: $with_prs,
              batch_count: ($batches | length),
              pr_batch_count: ($pr_batches | length),
              skipped_has_finding: $skipped_has_finding,
              skipped_count: $skipped_count
            }'
        output: "plan"
        parse_json: true
        timeout: 60

      # --- Investigate code state per batch (Provider A: Anthropic preferred) ---
      - id: "investigate-code-state"
        foreach: "{{plan.batches}}"
        as: "issue_batch"
        parallel: 3
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          You are investigating open GitHub issues for **{{repo_name}}**.
          The repository is cloned at: {{repo_path}}

          ## Issues to Investigate (Batch)

          {{issue_batch}}

          ## Instructions

          For EACH issue in this batch:

          1. **Read the issue** carefully — understand the reported problem
          2. **Identify relevant source files** from the issue description, error messages, and file references
          3. **Read the source code** in those files to determine current state
          4. **Check recent git history**: `git log --oneline -10 -- <file>`
          5. **Determine your verdict:**
             - **SOLVED** — The issue is fixed in the current codebase
             - **PARTIALLY_SOLVED** — Some aspects addressed, others remain
             - **UNSOLVED** — The issue still exists as described

          Return ONLY a JSON array (no markdown fences):

          [
            {
              "issue_number": 123,
              "issue_title": "Title",
              "verdict": "SOLVED",
              "files_examined": ["src/foo.py:45-67", "src/bar.py"],
              "evidence": "Specific evidence supporting your verdict",
              "remaining_work": ""
            }
          ]
        collect: "code_investigations"
        parse_json: true
        timeout: 900
        on_error: "continue"

      # --- Verify PR fixes by reading actual diffs (Provider A: Anthropic preferred) ---
      - id: "verify-pr-fixes"
        foreach: "{{plan.pr_batches}}"
        as: "pr_batch"
        parallel: 3
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          You are verifying whether merged PRs actually fix reported GitHub issues
          in **{{repo_name}}** (local path: {{repo_path}}).

          ## Issues with Linked PRs (Batch)

          {{pr_batch}}

          ## Instructions

          For EACH issue in this batch:

          1. Read the issue to understand the reported problem
          2. For each linked PR number, fetch and read the diff:
             `gh pr diff <PR_NUMBER> --repo {{repo_name}}`
          3. Analyze the diff against the issue:
             - Does the PR change the right files?
             - Do the code changes address the root cause?
             - Are there edge cases the PR might miss?
          4. Assign a verdict per PR:
             - **FIXES_ISSUE** — Directly and completely addresses the issue
             - **PARTIALLY_FIXES** — Addresses some aspects but not all
             - **UNRELATED** — Does not actually fix this issue

          Return ONLY a JSON array (no markdown fences):

          [
            {
              "issue_number": 123,
              "pr_verifications": [
                {
                  "pr_number": 45,
                  "verdict": "FIXES_ISSUE",
                  "diff_summary": "Brief summary of PR changes",
                  "evidence": "How changes relate to the issue"
                }
              ],
              "overall_verdict": "FIXED",
              "explanation": "Overall assessment"
            }
          ]
        collect: "pr_verifications"
        parse_json: true
        timeout: 900
        on_error: "continue"

      # --- Cross-review: independent provider validates all findings ---
      - id: "cross-review"
        agent: "foundation:zen-architect"
        mode: "REVIEW"
        provider_preferences:
          - provider: openai
            model: gpt-*
          - provider: anthropic
            model: claude-sonnet-*
        prompt: |
          You are an INDEPENDENT REVIEWER. A different AI agent (Agent A)
          investigated GitHub issues for **{{repo_name}}** and produced these findings.

          YOUR ROLE: Critically review Agent A's work. Be skeptical and thorough.

          ## Code Investigation Findings (Agent A)
          {{code_investigations}}

          ## PR Verification Findings (Agent A)
          {{pr_verifications}}

          ## Review Criteria

          For each finding, evaluate:
          1. Is the verdict supported by cited evidence (specific files/lines)?
          2. Is the evidence sufficient, or could the verdict be wrong?
          3. Are there logical errors, contradictions, or unsupported claims?
          4. Were the right files examined, or could the issue be elsewhere?
          5. For PR verifications — did Agent A actually read the diff?

          If you DISAGREE, you may read source code at {{repo_path}} to verify.

          Return ONLY a JSON object (no markdown fences):

          {
            "reviews": [
              {
                "issue_number": 123,
                "original_verdict": "SOLVED",
                "reviewer_verdict": "AGREE",
                "revised_verdict": "SOLVED",
                "confidence": 8,
                "reasoning": "Evidence is strong — file was clearly modified to fix the bug"
              }
            ],
            "summary": "Overall quality assessment of Agent A's findings",
            "agreement_rate": "85%",
            "critical_disagreements": []
          }
        output: "cross_review"
        parse_json: true
        timeout: 900

    approval:
      required: true
      prompt: |
        ## Investigation Complete — Review Before Proceeding

        **Issues investigated:** {{plan.total_issues}}
        **Issues with PR verification:** {{plan.issues_with_prs}}
        **Issues skipped (existing findings):** {{plan.skipped_count}}

        ### Cross-Review Summary
        {{cross_review}}

        ---
        **Approve** to proceed with posting findings to GitHub issues and generating the report.
        **Deny** to stop here (findings are saved in the session).
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 3: POST-FINDINGS
  # Format triage findings as GitHub issue comments for review before posting.
  # ===========================================================================
  - name: "post-findings"
    steps:
      # --- Format cross-reviewed findings as GitHub issue comments ---
      - id: "format-finding-comments"
        agent: "foundation:zen-architect"
        mode: "ARCHITECT"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          Format triage findings as GitHub issue comments for **{{repo_name}}**.

          ## Cross-Reviewed Findings
          {{cross_review}}

          ## Code Investigation Results
          {{code_investigations}}

          ## Initial Triage Data (includes has_existing_finding flags)
          {{initial_triage}}

          ## Instructions

          Create a GitHub issue comment for each investigated issue that does **NOT**
          have `has_existing_finding: true` in the initial triage data above.

          **SKIP** any issue where `has_existing_finding` is `true` — do NOT generate
          a comment for it (it already has one posted to GitHub).

          Each comment body MUST follow this **exact** structure (pay close attention
          to the first line):

          Line 1: <!-- amplifier-triage-finding -->
          Line 2: ## Triage Investigation — YYYY-MM-DD
          Line 3: (blank)
          Line 4: **Verdict:** SOLVED / PARTIALLY_SOLVED / UNSOLVED
          Line 5: **Confidence:** X/10
          Line 6: (blank)
          Line 7: ### Evidence
          Lines:  - **Files examined:** list of files and line ranges
          Lines:  - **Findings:** specific evidence supporting the verdict
          Line:   (blank)
          Line:   ### Remaining Work
          Lines:  Description of remaining work, or "None — issue appears fully resolved."
          Line:   (blank)
          Line:   ---
          Line:   *Automated triage by amplifier-distro issue triage recipe*

          **CRITICAL RULES:**
          - The `<!-- amplifier-triage-finding -->` marker MUST be the VERY FIRST
            line of the comment body. No blank lines, no whitespace before it.
          - Use today's date (YYYY-MM-DD format) for the investigation header.
          - Pull verdicts and confidence from the cross-review data (use the
            `revised_verdict` and `confidence` fields).
          - Pull evidence details from the code investigation results.

          Return ONLY a JSON array (no markdown fences, no commentary):

          [
            {
              "issue_number": 123,
              "comment_body": "<!-- amplifier-triage-finding -->\n## Triage Investigation — 2026-03-05\n\n**Verdict:** SOLVED\n**Confidence:** 8/10\n\n### Evidence\n- **Files examined:** src/auth.py:45-67\n- **Findings:** The timeout logic was rewritten in commit abc123\n\n### Remaining Work\nNone — issue appears fully resolved.\n\n---\n*Automated triage by amplifier-distro issue triage recipe*"
            }
          ]

          If ALL investigated issues already have existing findings (nothing to
          post), return an empty array: []
        output: "finding_comments"
        parse_json: true
        timeout: 900

    approval:
      required: true
      prompt: |
        ## Finding Comments Ready for Review

        The following comments will be posted to GitHub issues in **{{repo_name}}**:

        {{finding_comments}}

        ---
        Comments will NOT be posted for issues that already have triage findings.

        **Approve** to post these comments to the respective GitHub issues.
        **Deny** to skip posting (findings are still available in the session and
        will appear in the report regardless).
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 4: REPORT
  # Post finding comments to GitHub, synthesize all findings into a structured
  # report, and write to file.
  # ===========================================================================
  - name: "report"
    steps:
      # --- Post finding comments to GitHub issues ---
      - id: "post-finding-comments"
        type: "bash"
        command: |
          set -euo pipefail

          # Write finding comments JSON safely via heredoc
          _comments_tmp=$(mktemp)
          cat > "$_comments_tmp" << 'COMMENTS_JSON_EOF_8b4f1c'
          {{finding_comments}}
          COMMENTS_JSON_EOF_8b4f1c
          comments=$(cat "$_comments_tmp")
          rm -f "$_comments_tmp"

          # Count comments to post
          count=$(echo "$comments" | jq 'length')

          if [ "$count" -eq 0 ]; then
            echo "No comments to post (all investigated issues already have findings)."
            jq -n '{posted: 0, failed: 0, total: 0}'
            exit 0
          fi

          echo "Posting $count triage finding comment(s) to {{repo_name}}..."

          # Post each comment using --body-file for safe content handling
          posted=0
          failed=0
          _body_tmp=$(mktemp)

          for i in $(seq 0 $((count - 1))); do
            issue_num=$(echo "$comments" | jq -r ".[$i].issue_number")
            echo "$comments" | jq -r ".[$i].comment_body" > "$_body_tmp"

            echo "  Posting finding to issue #${issue_num}..."
            if gh issue comment "$issue_num" --repo "{{repo_name}}" --body-file "$_body_tmp"; then
              posted=$((posted + 1))
              echo "    Posted to #${issue_num}"
            else
              failed=$((failed + 1))
              echo "    Failed to post to #${issue_num}" >&2
            fi

            # Rate limit between posts
            sleep 1
          done

          rm -f "$_body_tmp"

          echo ""
          echo "Results: $posted posted, $failed failed out of $count total"

          # Output summary as JSON
          jq -n \
            --argjson posted "$posted" \
            --argjson failed "$failed" \
            --argjson total "$count" \
            '{posted: $posted, failed: $failed, total: $total}'
        output: "post_results"
        parse_json: true
        timeout: 300
        on_error: "continue"

      # --- Synthesize all findings into a markdown report ---
      - id: "synthesize"
        agent: "foundation:zen-architect"
        mode: "ARCHITECT"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          Compile a comprehensive **GitHub Issue Triage Report** for **{{repo_name}}**.

          ## Source Data

          ### Initial Triage (Issue-PR Cross-Reference)
          {{initial_triage}}

          ### Code Investigation Results
          {{code_investigations}}

          ### PR Verification Results
          {{pr_verifications}}

          ### Cross-Review (Independent Validation)
          {{cross_review}}

          ### Previously Investigated Issues (Skipped)
          {{plan.skipped_has_finding}}

          ### Finding Comment Post Results
          {{post_results}}

          ## Report Structure

          Generate a complete markdown report with these sections:

          # GitHub Issue Triage Report — {{repo_name}}
          *Generated: [today's date] | Focus: {{focus}} | Issues analyzed: {{plan.total_issues}} | Skipped (existing findings): {{plan.skipped_count}}*

          ## Executive Summary
          - Total issues analyzed, breakdown by verdict (SOLVED / PARTIALLY SOLVED / UNSOLVED)
          - Issues skipped due to existing findings (count and reason)
          - Cross-review agreement rate and confidence levels
          - Finding comments posted to GitHub (count and status)
          - Key findings and surprises

          ## Issues to Close (SOLVED)
          Table: Issue # | Title | Evidence | Linked PRs | Confidence

          ## Issues Needing Follow-Up (PARTIALLY SOLVED)
          Per issue: what was resolved, what remains, suggested next steps

          ## Issues Needing Attention (UNSOLVED)
          Per issue: current code state, root cause analysis, proposed solution, priority

          ## Previously Investigated (Skipped)
          For each issue in the "Previously Investigated Issues (Skipped)" data:
          - Show the issue number, title, and their existing verdict
          - Note when the previous investigation was performed (from finding text date)
          - Flag if the existing verdict might be outdated based on recent PR activity
          If no issues were skipped, write: "All issues were investigated in this run."

          ## Disputed Findings
          Where Agent A and the Reviewer disagreed — both perspectives, recommended resolution

          ## Recommendations
          1. Issues safe to close (with justification)
          2. Issues to prioritize (with reasoning)
          3. Previously investigated issues worth re-examining (if any)
          4. Suggested next actions for the team

          ---

          DO NOT write any files. Return the complete markdown content only.
        output: "final_report"
        timeout: 900

      # --- Write report to file (guaranteed I/O via bash) ---
      - id: "write-report"
        type: "bash"
        command: |
          set -euo pipefail

          # Determine output path
          report_path="{{report_path}}"
          if [ -z "$report_path" ]; then
            report_path="{{repo_path}}/triage-reports/triage-report-$(date +%Y%m%d-%H%M%S).md"
          fi

          # Ensure directory exists
          mkdir -p "$(dirname "$report_path")"

          # Write report atomically: temp file then move
          cat > "${report_path}.tmp" << 'TRIAGE_REPORT_EOF_39f8a2c1'
          {{final_report}}
          TRIAGE_REPORT_EOF_39f8a2c1

          mv "${report_path}.tmp" "$report_path"

          # Verify write succeeded
          if [ -s "$report_path" ]; then
            bytes=$(wc -c < "$report_path")
            echo "Report written: $report_path ($bytes bytes)"
          else
            echo "ERROR: Report file is empty or write failed" >&2
            exit 1
          fi
        output: "final_output"
        timeout: 60
        on_error: "fail"

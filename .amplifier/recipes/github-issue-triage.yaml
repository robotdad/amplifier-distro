# =============================================================================
# GitHub Issue Triage Recipe (Incremental, Content-Aware)
# =============================================================================
#
# Automated workflow for triaging GitHub issues with content-aware classification.
# Reads each issue to understand its nature (bug, feature request, blocked,
# stale) and responds appropriately — investigating code for bugs, noting scope
# for feature requests, tracking dependencies for blocked issues, and flagging
# stale ones for cleanup.
#
# Supports incremental operation — detects existing triage findings posted
# to issues and skips re-investigation unless explicitly requested.
#
# Fetches open issues (with comments), merged PRs, and repo labels;
# cross-references them; detects prior triage findings via hidden HTML markers;
# classifies issues by content (not existing labels); investigates code state
# for bugs; verifies PR fixes by reading actual diffs; suggests and applies
# labels; cross-validates all findings with a second LLM provider; posts
# findings as comments to GitHub issues; and compiles everything into a
# structured triage report grouped by category.
#
# Requirements:
#   - GitHub CLI (gh) installed and authenticated with repo access
#   - foundation bundle (provides zen-architect agent)
#   - At least one LLM provider configured (two recommended for cross-validation)
#   - jq installed (for JSON processing in bash steps)
#
# Usage:
#   amplifier run "execute github-issue-triage.yaml \
#     with repo_path=/path/to/repo repo_name=org/repo"
#
# Context variables:
#   - repo_path (required):  Local filesystem path to the cloned git repository
#   - repo_name (required):  GitHub org/repo identifier (e.g., "microsoft/amplifier")
#   - focus (optional):      Label filter — "bugs", "enhancements", or "all" (default: "all")
#   - max_issues (optional): Max issues to fetch; empty string = up to 200 (default: "")
#   - batch_size (optional): Issues per investigation batch (default: "5")
#   - report_path (optional): Output file path (default: <repo_path>/triage-reports/triage-report-<timestamp>.md)
#
# Stages:
#   1. discovery       — Fetch issues (with comments)/PRs/labels, detect existing
#                         findings, cross-reference, produce initial triage
#                         [APPROVAL GATE: user selects which issues to investigate;
#                          default "new" skips previously investigated issues]
#   2. investigation   — Content-aware classification, deep code investigation for
#                         bugs, PR diff verification, auto-label suggestions,
#                         cross-review with category/verdict validation
#                         [APPROVAL GATE: user reviews findings before proceeding]
#   3. post-findings   — Format triage findings as GitHub issue comments, prepare
#                         label changes for review
#                         [APPROVAL GATE: user reviews comments + labels before posting]
#   4. report          — Post finding comments, apply labels (add-only),
#                         synthesize findings grouped by category, write report
#
# Issue categories (determined by content, not existing labels):
#   - bug:             Describes broken, wrong, or unexpected behavior
#   - feature_request: Requests new functionality that doesn't exist
#   - blocked:         Blocked on external/upstream work
#   - stale:           May no longer be relevant
#
# Verdict set:
#   - SOLVED:           Bug is fixed in current code
#   - PARTIALLY_SOLVED: Some aspects of a bug are fixed, others remain
#   - UNSOLVED:         Bug still exists as described
#   - FEATURE_REQUEST:  Issue is requesting new functionality
#   - BLOCKED_UPSTREAM: Depends on work in another repo/project
#   - STALE:            Issue may no longer be relevant
#
# Incremental behavior:
#   Issues with an existing <!-- amplifier-triage-finding --> comment are detected
#   during discovery. By default ("new"), they are skipped during investigation.
#   Users can override with "all" to re-investigate, or specify issue numbers.
#   Finding comments are only posted for issues that don't already have one.
#
# Auto-labeling:
#   Available repo labels are fetched during discovery. Investigation suggests
#   labels based on content analysis. Labels are applied (add-only, never
#   removed) during the post-findings stage after user approval. Only labels
#   that already exist on the repository are applied.
#
# Typical runtime: 15-50 minutes depending on issue count
#
# Provider strategy:
#   - Investigation steps prefer Anthropic (Provider A)
#   - Cross-review step prefers OpenAI (Provider B) for independent validation
#   - All steps include fallbacks so the recipe works with a single provider
#
# =============================================================================
# CHANGELOG
# =============================================================================
#
# v1.2.0 (2026-03-06):
#   - NEW FEATURE: Content-aware issue classification
#     * investigate-code-state reads issue content and classifies by type
#       instead of assuming all issues are bugs
#     * New categories: bug, feature_request, blocked, stale
#     * Expanded verdict set: SOLVED, PARTIALLY_SOLVED, UNSOLVED,
#       FEATURE_REQUEST, BLOCKED_UPSTREAM, STALE
#     * THE KEY INSIGHT: Mislabeled issues are detected and reclassified
#       based on actual content — a "bug" label that's really a feature
#       request skips code investigation; an "enhancement" label describing
#       broken behavior gets full bug investigation
#   - NEW FEATURE: Auto-labeling with suggested labels
#     * Discovery stage fetches available repo labels via `gh label list`
#     * Investigation suggests labels based on content analysis
#     * Post-findings stage applies missing labels (add-only, never removes)
#     * Only applies labels that already exist on the repository
#   - IMPROVEMENT: Cross-review validates category/verdict consistency
#     * Detects contradictions (e.g., category "bug" with verdict "FEATURE_REQUEST")
#     * Reviews whether Agent A correctly classified issue content
#   - IMPROVEMENT: Report groups issues by category then verdict
#     * Bugs: SOLVED / PARTIALLY_SOLVED / UNSOLVED sections
#     * Feature Requests: with scope and effort notes
#     * Blocked: with dependency details
#     * Stale: candidates for closing
#   - IMPROVEMENT: Finding comments include category and suggested labels
#     * Category shown in comment header
#     * Suggested labels listed when different from current labels
#     * Feature request comments include scope/effort estimates
#     * Blocked issue comments note their dependencies
#
# v1.1.0 (2026-03-05):
#   - NEW FEATURE: Incremental triage with existing finding detection
#     * fetch-open-issues now fetches issue comments alongside metadata
#     * cross-reference step detects <!-- amplifier-triage-finding --> markers
#       in comments and categorizes issues with HAS_FINDING status
#     * Default approval behavior changed from "all" to "new" — previously
#       investigated issues are skipped by default
#   - NEW FEATURE: Post-findings stage with approval gate (new stage 3)
#     * Formats triage findings as GitHub-compatible markdown comments
#     * Each comment starts with hidden <!-- amplifier-triage-finding --> marker
#       for future incremental detection
#     * Posts findings via `gh issue comment` with --body-file for safe handling
#     * Approval gate allows review of all comments before posting
#     * Issues with existing findings are automatically excluded from posting
#   - IMPROVEMENT: Investigation stage respects existing findings
#     * "new" (default): only investigate issues without existing findings
#     * "all": re-investigate everything including previously investigated
#     * "unsolved": NO_LINKED_PR issues without existing findings
#     * Comma-separated issue numbers: always investigated regardless of status
#     * Investigation plan now tracks skipped issues for the report
#   - IMPROVEMENT: Report includes "Previously Investigated" section
#     * Shows issues skipped due to existing findings with their existing verdict
#     * Provides context on prior investigations without re-running them
#
# v1.0.0 (2026-03-05):
#   - Initial recipe implementation
#   - Three-stage workflow with two approval gates
#   - Cross-provider validation (Anthropic for investigation, OpenAI for review)
#   - Batch processing for efficient issue investigation
#   - Automatic PR diff verification for linked PRs
#   - Atomic file write for report output
#   - Rate limiting to prevent API throttling
#
# =============================================================================

name: "github-issue-triage"
description: "Incremental, content-aware GitHub issue triage: classifies issues by content (bug/feature/blocked/stale), investigates code state for bugs, verifies PR fixes via diffs, suggests and applies labels, cross-validates across providers, posts categorized findings as issue comments, and generates a structured report grouped by category"
version: "1.2.0"
tags: ["github", "triage", "issues", "cross-validation", "report", "incremental", "labeling"]

context:
  repo_path: "."          # Local path to the cloned git repo (default: current directory)
  repo_name: "microsoft/amplifier-distro"  # GitHub org/repo
  focus: "all"            # Optional: "bugs", "enhancements", or "all"
  max_issues: ""          # Optional: max issues to fetch ("" = up to 200)
  batch_size: "5"         # Optional: issues per investigation batch (5-10 recommended)
  report_path: ""         # Optional: output path (default: <repo_path>/triage-reports/triage-report-<ts>.md)
  _approval_message: "new"  # Runtime: set by approval gate (default: skip previously investigated)

rate_limiting:
  max_concurrent_llm: 3
  min_delay_ms: 500
  backoff:
    enabled: true
    initial_delay_ms: 2000
    max_delay_ms: 60000
    multiplier: 2.0

stages:
  # ===========================================================================
  # STAGE 1: DISCOVERY
  # Fetch issues (with comments), PRs, and repo labels from GitHub, detect
  # existing findings, cross-reference, produce initial triage.
  # ===========================================================================
  - name: "discovery"
    steps:
      # --- Fetch all open issues from GitHub (including comments for finding detection) ---
      - id: "fetch-open-issues"
        type: "bash"
        command: |
          set -euo pipefail
          cd "{{repo_path}}"

          focus="{{focus}}"
          max_issues="{{max_issues}}"

          # Build label filter based on focus area
          label_filter=""
          if [ "$focus" = "bugs" ]; then
            label_filter="--label bug"
          elif [ "$focus" = "enhancements" ]; then
            label_filter="--label enhancement"
          fi

          # Build limit flag
          if [ -n "$max_issues" ] && [ "$max_issues" != "0" ]; then
            limit_flag="--limit $max_issues"
          else
            limit_flag="--limit 200"
          fi

          gh issue list --repo "{{repo_name}}" --state open \
            --json number,title,body,labels,comments \
            $label_filter $limit_flag
        output: "open_issues"
        parse_json: true
        timeout: 120

      # --- Fetch recently merged PRs ---
      - id: "fetch-merged-prs"
        type: "bash"
        command: |
          set -euo pipefail
          cd "{{repo_path}}"

          gh pr list --repo "{{repo_name}}" --state merged \
            --json number,title,body \
            --limit 200
        output: "merged_prs"
        parse_json: true
        timeout: 120

      # --- Fetch available repository labels (for auto-labeling) ---
      - id: "fetch-repo-labels"
        type: "bash"
        command: |
          set -euo pipefail
          gh label list --repo "{{repo_name}}" --json name --jq '.[].name' --limit 100
        output: "repo_labels"
        timeout: 60

      # --- Cross-reference issues against merged PRs + detect existing findings ---
      - id: "cross-reference"
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          You are triaging GitHub issues for **{{repo_name}}**.

          ## Open Issues (focus: {{focus}})
          {{open_issues}}

          ## Recently Merged PRs
          {{merged_prs}}

          ## Task

          Cross-reference every open issue against the merged PRs AND check for
          existing triage findings in the issue comments.

          ### Step 1: Detect Existing Triage Findings

          For each issue, examine its `comments` array. Look for any comment whose
          `body` starts with `<!-- amplifier-triage-finding -->` on the **first line**.

          - If found: set `has_existing_finding` to `true`, extract the verdict
            (SOLVED / PARTIALLY_SOLVED / UNSOLVED / FEATURE_REQUEST / BLOCKED_UPSTREAM / STALE)
            from the comment body, and include the full comment body as
            `existing_finding_text`.
          - If the `comments` array is empty or no comment has the marker:
            set `has_existing_finding` to `false`, and set `existing_finding_verdict`
            and `existing_finding_text` to `null`.

          ### Step 2: Cross-Reference with Merged PRs

          1. Check if any PR title or body references the issue (e.g., "fixes #123", "closes #45")
          2. Check for semantic matches — PRs that change the same area or address the same problem
          3. Assign an initial assessment per issue:
             - **LIKELY_FIXED** — A merged PR clearly targets this issue
             - **POSSIBLY_FIXED** — A merged PR may partially or indirectly address it
             - **NO_LINKED_PR** — No merged PR appears related

          Return ONLY a JSON array, no markdown fences, no commentary:

          [
            {
              "issue_number": 123,
              "issue_title": "Short title",
              "labels": ["bug"],
              "initial_assessment": "LIKELY_FIXED",
              "linked_prs": [45, 67],
              "reasoning": "PR #45 title mentions fixing the auth timeout from this issue",
              "has_existing_finding": false,
              "existing_finding_verdict": null,
              "existing_finding_text": null
            }
          ]

          Sort by: issues WITHOUT existing findings first, then by assessment
          (NO_LINKED_PR first, then POSSIBLY_FIXED, then LIKELY_FIXED).
        output: "initial_triage"
        parse_json: true
        timeout: 900

    approval:
      required: true
      prompt: |
        ## Initial Triage Complete

        {{initial_triage}}

        ---
        **Note:** Issues marked with `has_existing_finding: true` have been
        previously investigated. Their existing verdict is shown above.

        **Select issues for deep investigation.** Approve with one of:

        - **"new"** — Only investigate issues WITHOUT existing findings *(DEFAULT)*
        - **"all"** — Re-investigate everything including previously investigated
        - **"unsolved"** — Investigate only NO_LINKED_PR issues (excludes existing findings)
        - **"12,34,56"** — Investigate specific issue numbers (comma-separated)

        Or **deny** to stop the workflow.
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 2: INVESTIGATION
  # Content-aware classification, deep code investigation for bugs, PR diff
  # verification, auto-label suggestions, cross-provider review.
  # ===========================================================================
  - name: "investigation"
    steps:
      # --- Prepare investigation plan from user's approval selection ---
      - id: "prepare-investigation"
        type: "bash"
        command: |
          set -euo pipefail

          selection="{{_approval_message}}"

          # Write triage JSON safely via heredoc to avoid shell quoting issues
          _triage_tmp=$(mktemp)
          cat > "$_triage_tmp" << 'TRIAGE_JSON_EOF_7a3e9b'
          {{initial_triage}}
          TRIAGE_JSON_EOF_7a3e9b
          triage=$(cat "$_triage_tmp")
          rm -f "$_triage_tmp"

          # Default to "new" if user approved without a message
          if [ -z "$selection" ]; then
            selection="new"
          fi

          # Identify issues with and without existing findings
          has_finding=$(echo "$triage" | jq -c \
            '[.[] | select(.has_existing_finding == true)]')
          no_finding=$(echo "$triage" | jq -c \
            '[.[] | select(.has_existing_finding != true)]')

          # Filter issues based on user's selection
          if [ "$selection" = "new" ]; then
            # Only issues WITHOUT existing findings
            selected=$(echo "$no_finding" | jq -c '.')
          elif [ "$selection" = "all" ]; then
            # All issues including previously investigated
            selected=$(echo "$triage" | jq -c '.')
          elif [ "$selection" = "unsolved" ]; then
            # NO_LINKED_PR issues without existing findings
            selected=$(echo "$no_finding" | jq -c \
              '[.[] | select(.initial_assessment == "NO_LINKED_PR")]')
          else
            # Parse comma-separated issue numbers (explicit selection)
            numbers=$(echo "$selection" | tr ',' '\n' \
              | sed 's/[^0-9]//g' \
              | jq -R 'select(length > 0) | tonumber' \
              | jq -sc '.')
            selected=$(echo "$triage" | jq -c --argjson nums "$numbers" \
              '[.[] | select(.issue_number as $n | $nums | index($n))]')
          fi

          # Track HAS_FINDING issues that were NOT selected for investigation
          skipped_findings=$(jq -nc \
            --argjson has "$has_finding" \
            --argjson sel "$selected" \
            '[$has[] | select(.issue_number as $n |\
              [$sel[].issue_number] | index($n) | not)]')

          # Split selected issues into batches
          batch_size={{batch_size}}
          batches=$(echo "$selected" | jq -c \
            "[range(0; length; $batch_size) as \$i | .[\$i:\$i+$batch_size]]")

          # Extract issues with linked PRs (for PR diff verification)
          issues_with_prs=$(echo "$selected" | jq -c \
            '[.[] | select(.linked_prs | length > 0)]')
          pr_batches=$(echo "$issues_with_prs" | jq -c \
            "[range(0; length; $batch_size) as \$i | .[\$i:\$i+$batch_size]]")

          # Output the investigation plan
          jq -n \
            --argjson batches "$batches" \
            --argjson pr_batches "$pr_batches" \
            --argjson total "$(echo "$selected" | jq 'length')" \
            --argjson with_prs "$(echo "$issues_with_prs" | jq 'length')" \
            --argjson skipped_has_finding "$skipped_findings" \
            --argjson skipped_count "$(echo "$skipped_findings" | jq 'length')" \
            '{
              batches: $batches,
              pr_batches: $pr_batches,
              total_issues: $total,
              issues_with_prs: $with_prs,
              batch_count: ($batches | length),
              pr_batch_count: ($pr_batches | length),
              skipped_has_finding: $skipped_has_finding,
              skipped_count: $skipped_count
            }'
        output: "plan"
        parse_json: true
        timeout: 60

      # --- Content-aware investigation per batch (Provider A: Anthropic preferred) ---
      - id: "investigate-code-state"
        foreach: "{{plan.batches}}"
        as: "issue_batch"
        parallel: 3
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          You are investigating open GitHub issues for **{{repo_name}}**.
          The repository is cloned at: {{repo_path}}

          ## Available Repository Labels
          {{repo_labels}}

          ## Issues to Investigate (Batch)

          {{issue_batch}}

          ## Instructions

          For EACH issue in this batch:

          ### Step 1: Read and Classify

          Read the issue carefully — its title, body, and any discussion — and
          determine what KIND of issue it actually is based on its **content**:

          - **bug** — Describes broken, wrong, or unexpected behavior
          - **feature_request** — Requests new functionality that doesn't exist yet
          - **blocked** — Blocked on external/upstream work in another repo or project
          - **stale** — Issue may no longer be relevant (old, no activity, describes outdated state)

          **You are not pre-classifying — you are reading the issue, understanding
          it, and responding appropriately. A mislabeled "enhancement" that describes
          broken behavior should be investigated as a bug. A mislabeled "bug" that's
          actually requesting new functionality should be noted as a feature request
          without wasting time on code investigation.**

          ### Step 2: Take Appropriate Action Based on Category

          **If bug:**
          1. Identify relevant source files from the issue description, error messages, file references
          2. Read the source code in those files to determine current state
          3. Check recent git history: `git log --oneline -10 -- <file>`
          4. Determine verdict: **SOLVED**, **PARTIALLY_SOLVED**, or **UNSOLVED**

          **If feature_request:**
          1. Note what functionality is being requested
          2. Briefly describe what would be needed (scope, affected areas, effort estimate)
          3. Verdict: **FEATURE_REQUEST**
          4. Skip code investigation — do not waste time verifying code state

          **If blocked:**
          1. Identify what it's blocked on (external dependency, upstream issue, etc.)
          2. Note the blocking dependency and any tracking links
          3. Verdict: **BLOCKED_UPSTREAM**

          **If stale:**
          1. Note why the issue appears stale (age, no activity, describes outdated state)
          2. Verdict: **STALE**
          3. Flag as candidate for closing

          ### Step 3: Suggest Labels

          Based on your content analysis, suggest what labels the issue SHOULD have.
          Only suggest labels from the "Available Repository Labels" list above.
          Compare your suggestions against the issue's current labels and note any
          that should be added.

          ## Output Format

          Return ONLY a JSON array (no markdown fences):

          [
            {
              "issue_number": 123,
              "issue_title": "Title",
              "category": "bug",
              "verdict": "UNSOLVED",
              "files_examined": ["src/foo.py:45-67", "src/bar.py"],
              "evidence": "Specific evidence supporting your verdict",
              "remaining_work": "Description of remaining work, or empty string if none",
              "suggested_labels": ["bug", "area/auth"]
            }
          ]

          **Field notes by category:**
          - **bug**: `files_examined` and `evidence` are required; `remaining_work`
            describes what's left (empty string if SOLVED)
          - **feature_request**: `files_examined` can be empty; `evidence` describes
            what's requested and scope/effort estimate; `remaining_work` describes
            what would need to be built
          - **blocked**: `files_examined` can be empty; `evidence` describes the
            blocking dependency; `remaining_work` describes what's needed to unblock
          - **stale**: `files_examined` can be empty; `evidence` explains why it's
            stale; `remaining_work` is empty or describes cleanup needed

          **Valid category → verdict combinations:**
          - category "bug" → SOLVED, PARTIALLY_SOLVED, or UNSOLVED
          - category "feature_request" → FEATURE_REQUEST
          - category "blocked" → BLOCKED_UPSTREAM
          - category "stale" → STALE
        collect: "code_investigations"
        parse_json: true
        timeout: 900
        on_error: "continue"

      # --- Verify PR fixes by reading actual diffs (Provider A: Anthropic preferred) ---
      - id: "verify-pr-fixes"
        foreach: "{{plan.pr_batches}}"
        as: "pr_batch"
        parallel: 3
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          You are verifying whether merged PRs actually fix reported GitHub issues
          in **{{repo_name}}** (local path: {{repo_path}}).

          ## Issues with Linked PRs (Batch)

          {{pr_batch}}

          ## Instructions

          For EACH issue in this batch:

          1. Read the issue to understand the reported problem
          2. For each linked PR number, fetch and read the diff:
             `gh pr diff <PR_NUMBER> --repo {{repo_name}}`
          3. Analyze the diff against the issue:
             - Does the PR change the right files?
             - Do the code changes address the root cause?
             - Are there edge cases the PR might miss?
          4. Assign a verdict per PR:
             - **FIXES_ISSUE** — Directly and completely addresses the issue
             - **PARTIALLY_FIXES** — Addresses some aspects but not all
             - **UNRELATED** — Does not actually fix this issue

          Return ONLY a JSON array (no markdown fences):

          [
            {
              "issue_number": 123,
              "pr_verifications": [
                {
                  "pr_number": 45,
                  "verdict": "FIXES_ISSUE",
                  "diff_summary": "Brief summary of PR changes",
                  "evidence": "How changes relate to the issue"
                }
              ],
              "overall_verdict": "FIXED",
              "explanation": "Overall assessment"
            }
          ]
        collect: "pr_verifications"
        parse_json: true
        timeout: 900
        on_error: "continue"

      # --- Cross-review: independent provider validates all findings ---
      - id: "cross-review"
        agent: "foundation:zen-architect"
        mode: "REVIEW"
        provider_preferences:
          - provider: openai
            model: gpt-*
          - provider: anthropic
            model: claude-sonnet-*
        prompt: |
          You are an INDEPENDENT REVIEWER. A different AI agent (Agent A)
          investigated GitHub issues for **{{repo_name}}** and produced these findings.

          YOUR ROLE: Critically review Agent A's work. Be skeptical and thorough.

          ## Code Investigation Findings (Agent A)
          {{code_investigations}}

          ## PR Verification Findings (Agent A)
          {{pr_verifications}}

          ## Review Criteria

          For each finding, evaluate:

          1. **Evidence quality:** Is the verdict supported by cited evidence
             (specific files/lines)? Is the evidence sufficient, or could the
             verdict be wrong?
          2. **Logical consistency:** Are there logical errors, contradictions,
             or unsupported claims?
          3. **Coverage:** Were the right files examined, or could the issue be
             elsewhere?
          4. **PR verification:** For PR verifications — did Agent A actually
             read the diff?
          5. **Category correctness:** Did Agent A correctly classify the issue
             content? Does the issue actually describe what Agent A says it does?
             A bug misclassified as a feature request (or vice versa) is a
             critical error.
          6. **Category/verdict consistency:** Is the category/verdict combination
             valid?
             - category "bug" → verdict must be SOLVED, PARTIALLY_SOLVED, or UNSOLVED
             - category "feature_request" → verdict must be FEATURE_REQUEST
             - category "blocked" → verdict must be BLOCKED_UPSTREAM
             - category "stale" → verdict must be STALE
             - Flag any contradictions (e.g., category "bug" with verdict
               "FEATURE_REQUEST" means either the category or verdict is wrong)

          If you DISAGREE with a finding, you may read source code at {{repo_path}}
          to verify. If you disagree with a category, explain why based on the
          issue content.

          Return ONLY a JSON object (no markdown fences):

          {
            "reviews": [
              {
                "issue_number": 123,
                "original_category": "bug",
                "original_verdict": "SOLVED",
                "reviewer_verdict": "AGREE",
                "revised_category": "bug",
                "revised_verdict": "SOLVED",
                "category_verdict_consistent": true,
                "confidence": 8,
                "reasoning": "Evidence is strong — file was clearly modified to fix the bug"
              }
            ],
            "summary": "Overall quality assessment of Agent A's findings",
            "agreement_rate": "85%",
            "critical_disagreements": [],
            "category_issues": []
          }

          **Notes:**
          - `reviewer_verdict`: "AGREE" if you agree, or the corrected verdict if not
          - `revised_category`: same as original if you agree, or corrected category
          - `revised_verdict`: the final verdict after your review
          - `category_verdict_consistent`: false if the combination is invalid
          - `category_issues`: list any cases where Agent A misclassified content
        output: "cross_review"
        parse_json: true
        timeout: 900

    approval:
      required: true
      prompt: |
        ## Investigation Complete — Review Before Proceeding

        **Issues investigated:** {{plan.total_issues}}
        **Issues with PR verification:** {{plan.issues_with_prs}}
        **Issues skipped (existing findings):** {{plan.skipped_count}}

        ### Cross-Review Summary
        {{cross_review}}

        ---
        **Approve** to proceed with posting findings to GitHub issues and generating the report.
        **Deny** to stop here (findings are saved in the session).
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 3: POST-FINDINGS
  # Format triage findings as GitHub issue comments with category-specific
  # content and label suggestions for review before posting.
  # ===========================================================================
  - name: "post-findings"
    steps:
      # --- Format cross-reviewed findings as GitHub issue comments ---
      - id: "format-finding-comments"
        agent: "foundation:zen-architect"
        mode: "ARCHITECT"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          Format triage findings as GitHub issue comments for **{{repo_name}}**.

          ## Cross-Reviewed Findings
          {{cross_review}}

          ## Code Investigation Results
          {{code_investigations}}

          ## Initial Triage Data (includes current labels and has_existing_finding flags)
          {{initial_triage}}

          ## Available Repository Labels
          {{repo_labels}}

          ## Instructions

          Create a GitHub issue comment for each investigated issue that does **NOT**
          have `has_existing_finding: true` in the initial triage data above.

          **SKIP** any issue where `has_existing_finding` is `true` — do NOT generate
          a comment for it (it already has one posted to GitHub).

          For each comment, use the **cross-reviewed** category and verdict (from
          `revised_category` and `revised_verdict` in the cross-review data). If the
          cross-review revised the category or verdict, use the revised values.

          ### Comment Format by Category

          Each comment body MUST start with the hidden marker on line 1, then follow
          the category-specific format below.

          **ALL categories share this header:**

          ```
          <!-- amplifier-triage-finding -->
          ## Triage Investigation — YYYY-MM-DD

          **Category:** Bug / Feature Request / Blocked / Stale
          **Verdict:** SOLVED / PARTIALLY_SOLVED / UNSOLVED / FEATURE_REQUEST / BLOCKED_UPSTREAM / STALE
          **Confidence:** X/10
          ```

          **For bugs (SOLVED / PARTIALLY_SOLVED / UNSOLVED):**
          ```
          ### Evidence
          - **Files examined:** list of files and line ranges
          - **Findings:** specific evidence supporting the verdict

          ### Remaining Work
          Description of remaining work, or "None — issue appears fully resolved."
          ```

          **For feature requests (FEATURE_REQUEST):**
          ```
          ### What's Requested
          Description of the requested functionality

          ### Scope & Effort
          - Estimated scope: Small / Medium / Large
          - Key areas affected: list of modules/files
          - Dependencies: any prerequisites or blockers
          ```

          **For blocked issues (BLOCKED_UPSTREAM):**
          ```
          ### Blocked On
          Description of the blocking dependency/upstream work

          ### Suggested Action
          What could be done to unblock or monitor progress
          ```

          **For stale issues (STALE):**
          ```
          ### Why Stale
          Reasoning for stale classification

          ### Recommendation
          Close / keep / update recommendation with justification
          ```

          **ALL categories end with this footer (include Suggested Labels section
          ONLY if the suggested labels differ from the issue's current labels):**

          ```
          ### Suggested Labels
          `label1`, `label2` *(currently missing: `label3`)*

          ---
          *Automated triage by amplifier-distro issue triage recipe*
          ```

          If suggested labels match current labels exactly, omit the
          "Suggested Labels" section entirely and go straight to the `---` footer.

          ### Label Computation

          For each issue:
          1. Get `suggested_labels` from the code investigation results
          2. Get current `labels` from the initial triage data
          3. Filter suggested labels to ONLY those that appear in the
             "Available Repository Labels" list above
          4. Compute `labels_to_add`: labels in suggested that are NOT in current
             (case-insensitive comparison on label names)

          ### Output Format

          Return ONLY a JSON array (no markdown fences, no commentary):

          [
            {
              "issue_number": 123,
              "comment_body": "<!-- amplifier-triage-finding -->\n## Triage Investigation — 2026-03-06\n\n**Category:** Bug\n**Verdict:** SOLVED\n**Confidence:** 8/10\n\n### Evidence\n...\n\n---\n*Automated triage by amplifier-distro issue triage recipe*",
              "labels_to_add": ["area/auth"]
            }
          ]

          **CRITICAL RULES:**
          - The `<!-- amplifier-triage-finding -->` marker MUST be the VERY FIRST
            line of the comment body. No blank lines, no whitespace before it.
          - Use today's date (YYYY-MM-DD format) for the investigation header.
          - Use revised_category / revised_verdict / confidence from cross-review.
          - `labels_to_add` must ONLY contain labels that: (a) exist in the repo's
            available labels AND (b) are not already on the issue. Empty array if
            no labels to add.
          - Category display names in comments: "Bug", "Feature Request", "Blocked", "Stale"

          If ALL investigated issues already have existing findings (nothing to
          post), return an empty array: []
        output: "finding_comments"
        parse_json: true
        timeout: 900

    approval:
      required: true
      prompt: |
        ## Finding Comments & Label Changes Ready for Review

        The following comments will be posted to GitHub issues in **{{repo_name}}**,
        and the listed labels will be added:

        {{finding_comments}}

        ---
        Comments will NOT be posted for issues that already have triage findings.
        Labels are ADD-ONLY — no existing labels will be removed.

        **Approve** to post these comments and apply labels to the respective GitHub issues.
        **Deny** to skip posting (findings are still available in the session and
        will appear in the report regardless).
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 4: REPORT
  # Post finding comments to GitHub, apply labels, synthesize all findings
  # into a structured report grouped by category, and write to file.
  # ===========================================================================
  - name: "report"
    steps:
      # --- Post finding comments to GitHub issues and apply labels ---
      - id: "post-finding-comments"
        type: "bash"
        command: |
          set -euo pipefail

          # Write finding comments JSON safely via heredoc
          _comments_tmp=$(mktemp)
          cat > "$_comments_tmp" << 'COMMENTS_JSON_EOF_8b4f1c'
          {{finding_comments}}
          COMMENTS_JSON_EOF_8b4f1c
          comments=$(cat "$_comments_tmp")
          rm -f "$_comments_tmp"

          # Count comments to post
          count=$(echo "$comments" | jq 'length')

          if [ "$count" -eq 0 ]; then
            echo "No comments to post (all investigated issues already have findings)."
            jq -n '{posted: 0, failed: 0, total: 0, labels_applied: 0, labels_failed: 0}'
            exit 0
          fi

          echo "Posting $count triage finding comment(s) to {{repo_name}}..."

          # Post each comment and apply labels
          posted=0
          failed=0
          labels_applied=0
          labels_failed=0
          _body_tmp=$(mktemp)

          for i in $(seq 0 $((count - 1))); do
            issue_num=$(echo "$comments" | jq -r ".[$i].issue_number")
            echo "$comments" | jq -r ".[$i].comment_body" > "$_body_tmp"

            # Post finding comment
            echo "  Posting finding to issue #${issue_num}..."
            if gh issue comment "$issue_num" --repo "{{repo_name}}" --body-file "$_body_tmp"; then
              posted=$((posted + 1))
              echo "    Posted to #${issue_num}"
            else
              failed=$((failed + 1))
              echo "    Failed to post to #${issue_num}" >&2
            fi

            # Apply suggested labels (add-only, one at a time for safety)
            label_count=$(echo "$comments" | jq ".[$i].labels_to_add // [] | length")
            if [ "$label_count" -gt 0 ]; then
              for j in $(seq 0 $((label_count - 1))); do
                label=$(echo "$comments" | jq -r ".[$i].labels_to_add[$j]")
                echo "    Adding label '$label' to #${issue_num}..."
                if gh issue edit "$issue_num" --repo "{{repo_name}}" --add-label "$label" 2>/dev/null; then
                  labels_applied=$((labels_applied + 1))
                else
                  labels_failed=$((labels_failed + 1))
                  echo "    Failed to add label '$label' to #${issue_num}" >&2
                fi
              done
            fi

            # Rate limit between issues
            sleep 1
          done

          rm -f "$_body_tmp"

          echo ""
          echo "Results: $posted posted, $failed failed out of $count total"
          echo "Labels: $labels_applied applied, $labels_failed failed"

          # Output summary as JSON
          jq -n \
            --argjson posted "$posted" \
            --argjson failed "$failed" \
            --argjson total "$count" \
            --argjson labels_applied "$labels_applied" \
            --argjson labels_failed "$labels_failed" \
            '{posted: $posted, failed: $failed, total: $total, labels_applied: $labels_applied, labels_failed: $labels_failed}'
        output: "post_results"
        parse_json: true
        timeout: 300
        on_error: "continue"

      # --- Synthesize all findings into a markdown report grouped by category ---
      - id: "synthesize"
        agent: "foundation:zen-architect"
        mode: "ARCHITECT"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          Compile a comprehensive **GitHub Issue Triage Report** for **{{repo_name}}**.

          ## Source Data

          ### Initial Triage (Issue-PR Cross-Reference)
          {{initial_triage}}

          ### Code Investigation Results
          {{code_investigations}}

          ### PR Verification Results
          {{pr_verifications}}

          ### Cross-Review (Independent Validation)
          {{cross_review}}

          ### Previously Investigated Issues (Skipped)
          {{plan.skipped_has_finding}}

          ### Finding Comment Post Results
          {{post_results}}

          ## Report Structure

          Generate a complete markdown report with these sections. **Group issues
          by category first, then by verdict within each category.**

          # GitHub Issue Triage Report — {{repo_name}}
          *Generated: [today's date] | Focus: {{focus}} | Issues analyzed: {{plan.total_issues}} | Skipped (existing findings): {{plan.skipped_count}}*

          ## Executive Summary
          - Total issues analyzed, breakdown by category:
            - Bugs: X (Y solved, Z partially solved, W unsolved)
            - Feature Requests: X
            - Blocked: X
            - Stale: X
          - Issues skipped due to existing findings (count and reason)
          - Cross-review agreement rate and confidence levels
          - Finding comments posted to GitHub (count and status)
          - Labels applied (count and status)
          - Key findings and surprises
          - Any category reclassifications (mislabeled issues)

          ## Bugs

          ### Ready to Close (SOLVED)
          Table: Issue # | Title | Evidence | Linked PRs | Confidence

          ### Needs Follow-Up (PARTIALLY_SOLVED)
          Per issue: what was resolved, what remains, suggested next steps

          ### Needs Attention (UNSOLVED)
          Per issue: current code state, root cause analysis, proposed solution, priority

          If no bugs were found, write: "No bug reports found in this triage run."

          ## Feature Requests
          Per issue: what's requested, scope/effort estimate, affected areas, suggested priority
          If no feature requests, write: "No feature requests found in this triage run."

          ## Blocked Issues
          Per issue: what it's blocked on, dependency details, suggested action to unblock
          If no blocked issues, write: "No blocked issues found in this triage run."

          ## Stale Issues
          Per issue: why it appears stale, recommendation (close/keep/update), justification
          If no stale issues, write: "No stale issues found in this triage run."

          ## Previously Investigated (Skipped)
          For each issue in the "Previously Investigated Issues (Skipped)" data:
          - Show the issue number, title, and their existing verdict
          - Note when the previous investigation was performed (from finding text date)
          - Flag if the existing verdict might be outdated based on recent PR activity
          If no issues were skipped, write: "All issues were investigated in this run."

          ## Disputed Findings
          Where Agent A and the Reviewer disagreed — both perspectives, recommended resolution.
          Include any category reclassifications (where the reviewer changed the category).

          ## Label Changes
          Summary of labels suggested and applied:
          - Labels added (count, which issues)
          - Labels that were suggested but already present
          - Any notable mismatches between existing and suggested labels

          ## Recommendations
          1. Bugs safe to close (with justification)
          2. Bugs to prioritize (with reasoning)
          3. Feature requests to consider (with scope notes)
          4. Blocked issues: actions to unblock
          5. Stale issues recommended for closing
          6. Previously investigated issues worth re-examining (if any)
          7. Suggested next actions for the team

          ---

          DO NOT write any files. Return the complete markdown content only.
        output: "final_report"
        timeout: 900

      # --- Write report to file (guaranteed I/O via bash) ---
      - id: "write-report"
        type: "bash"
        command: |
          set -euo pipefail

          # Determine output path
          report_path="{{report_path}}"
          if [ -z "$report_path" ]; then
            report_path="{{repo_path}}/triage-reports/triage-report-$(date +%Y%m%d-%H%M%S).md"
          fi

          # Ensure directory exists
          mkdir -p "$(dirname "$report_path")"

          # Write report atomically: temp file then move
          cat > "${report_path}.tmp" << 'TRIAGE_REPORT_EOF_39f8a2c1'
          {{final_report}}
          TRIAGE_REPORT_EOF_39f8a2c1

          mv "${report_path}.tmp" "$report_path"

          # Verify write succeeded
          if [ -s "$report_path" ]; then
            bytes=$(wc -c < "$report_path")
            echo "Report written: $report_path ($bytes bytes)"
          else
            echo "ERROR: Report file is empty or write failed" >&2
            exit 1
          fi
        output: "final_output"
        timeout: 60
        on_error: "fail"

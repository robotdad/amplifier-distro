<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>amplifier</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="/static/theme-init.js"></script>
  <link rel="stylesheet" href="/static/amplifier-theme.css">
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--canvas);
      gap: 32px;
      overflow: hidden;
    }

    .wordmark-loading {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--signal);
      letter-spacing: -0.03em;
      text-transform: lowercase;
      display: flex;
      align-items: baseline;
    }

    .wordmark-loading .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(16px);
      animation: letterIn var(--duration-normal, 400ms) var(--ease-out, cubic-bezier(0.22, 1, 0.36, 1)) forwards;
    }

    .wordmark-loading .dots {
      display: inline-flex;
      margin-left: 2px;
    }

    .wordmark-loading .dots .dot {
      opacity: 0;
      animation: dotPulse 1.5s var(--ease-out, cubic-bezier(0.22, 1, 0.36, 1)) infinite;
    }

    .wordmark-loading .dots .dot:nth-child(1) { animation-delay: 0.9s; }
    .wordmark-loading .dots .dot:nth-child(2) { animation-delay: 1.05s; }
    .wordmark-loading .dots .dot:nth-child(3) { animation-delay: 1.2s; }

    .status-text {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--ink-fog);
      transition: opacity var(--duration-fast, 200ms) var(--ease-out);
      text-align: center;
    }

    .status-text a {
      color: var(--signal);
      text-decoration: none;
    }

    .status-text a:hover {
      text-decoration: underline;
    }

    @keyframes letterIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes dotPulse {
      0%, 20% { opacity: 0; }
      40% { opacity: 1; }
      60%, 100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .wordmark-loading .letter {
        opacity: 1;
        transform: none;
        animation: fadeIn 0.5s ease forwards;
      }
      .wordmark-loading .dots .dot {
        animation: dotPulse 2s ease infinite;
      }
    }
  </style>
</head>
<body>
  <div class="wordmark-loading" aria-label="amplifier" role="heading" aria-level="1">
    <!-- Letters injected by JS for staggered animation -->
  </div>

  <p class="status-text" id="status">starting up...</p>

  <script>
    (function() {
      // Build the letter-by-letter wordmark
      var word = 'amplifier';
      var container = document.querySelector('.wordmark-loading');
      var stagger = 80; // ms between each letter

      for (var i = 0; i < word.length; i++) {
        var span = document.createElement('span');
        span.className = 'letter';
        span.textContent = word[i];
        span.style.animationDelay = (i * stagger) + 'ms';
        container.appendChild(span);
      }

      // Add the animated dots
      var dots = document.createElement('span');
      dots.className = 'dots';
      for (var d = 0; d < 3; d++) {
        var dot = document.createElement('span');
        dot.className = 'dot';
        dot.textContent = '.';
        dots.appendChild(dot);
      }
      container.appendChild(dots);

      // Polling logic
      var statusEl = document.getElementById('status');
      var startTime = Date.now();
      var timeoutMs = 30000;
      var pollInterval = 1000;
      var redirecting = false;

      function poll() {
        if (redirecting) return;

        fetch('/api/ready')
          .then(function(resp) { return resp.json(); })
          .then(function(data) {
            if (redirecting) return;
            if (data.ready) {
              redirecting = true;
              statusEl.textContent = 'ready';
              setTimeout(function() {
                if (data.phase === 'unconfigured') {
                  window.location.href = '/apps/install-wizard/';
                } else {
                  window.location.href = '/';
                }
              }, 400);
            } else {
              statusEl.textContent = 'starting up...';
              scheduleNext();
            }
          })
          .catch(function() {
            // Server not responding yet — keep trying
            scheduleNext();
          });
      }

      function scheduleNext() {
        if (Date.now() - startTime > timeoutMs) {
          statusEl.innerHTML =
            'taking longer than expected\u2026 <a href="/">continue anyway</a>';
          return;
        }
        setTimeout(poll, pollInterval);
      }

      // Start polling
      poll();
    })();
  </script>
</body>
</html>
